<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>blog.mytype.top - Code Universe</title>
    <!-- 引入 THREE.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #050505;
            --text-color: #e6edf3;
            --accent-color: #58a6ff;
            /* 原主色调 */
            --secondary-color: #bc13fe;
            /* 新增辅色调 */
            --nav-bg: rgba(22, 27, 34, 0.6);
            --netease-red: #c20c0c;
            --success-green: #3fb950;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Consolas', 'Fira Code', 'Noto Sans SC', sans-serif;
            overflow: hidden;
            height: 100vh;
            position: relative;
        }

        /* --- 1. 背景层设置 --- */
        #canvas-galaxy {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            /* 银河在最底层 */
        }

        /* 背景代码纹理 (JS动态打字) */
        #code-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            padding: 20px;
            font-family: 'Consolas', 'Fira Code', monospace;
            font-size: 14px;
            line-height: 1.5;
            color: rgba(88, 166, 255, 0.15);
            /* 极暗的蓝色代码 */
            z-index: 0;
            overflow: hidden;
            white-space: pre-wrap;
            pointer-events: none;
        }

        /* --- 2. 新版导航栏 (替换原有) --- */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            display: flex;
            justify-content: center;
            padding: 20px 0;
            z-index: 100;
            background: linear-gradient(to bottom, rgba(0, 0, 0, 0.9), transparent);
        }

        .nav-links {
            display: flex;
            gap: 40px;
            backdrop-filter: blur(5px);
            padding: 10px 40px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.03);
        }

        .nav-item {
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.3s;
            position: relative;
            cursor: pointer;
            font-family: 'Consolas', sans-serif;
        }

        .nav-item:hover,
        .nav-item.active {
            color: var(--accent-color);
            text-shadow: 0 0 8px var(--accent-color);
        }

        /* --- 3. 鼠标代码拖尾特效样式 --- */
        .code-particle {
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            font-family: 'Fira Code', monospace;
            font-weight: bold;
            font-size: 14px;
            user-select: none;
            white-space: nowrap;
            animation: floatUp 1s ease-out forwards;
        }

        @keyframes floatUp {
            0% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }

            100% {
                opacity: 0;
                transform: translateY(-50px) scale(0.5);
            }
        }

        /* --- 4. 主内容区 --- */
        main {
            position: relative;
            z-index: 10;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            pointer-events: none;
        }

        main * {
            pointer-events: auto;
        }

        #earth-container {
            width: 300px;
            height: 300px;
            margin-bottom: 25px;
            position: relative;
            pointer-events: auto;
        }

        #earth-container canvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 2;
            border-radius: 50%;
            display: block;
        }

        #canvas-audio-ripple {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
            opacity: 0.8;
            pointer-events: none;
        }

        h1 {
            font-size: 4rem;
            margin-bottom: 15px;
            font-weight: 700;
            letter-spacing: -1px;
            background: linear-gradient(120deg, #fff, #c9d1d9, #58a6ff);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 5px 15px rgba(0, 0, 0, 0.8);
        }

        .role-badge {
            display: inline-block;
            background: rgba(88, 166, 255, 0.1);
            color: #79c0ff;
            padding: 6px 16px;
            border-radius: 20px;
            font-family: 'Fira Code', monospace;
            font-size: 0.95rem;
            margin-bottom: 20px;
            border: 1px solid rgba(88, 166, 255, 0.2);
            backdrop-filter: blur(4px);
        }

        .quote-container {
            font-size: 1.4rem;
            color: #8b949e;
            height: 40px;
            font-weight: 300;
            font-family: 'Fira Code', monospace;
            text-shadow: 0 5px 15px rgba(0, 0, 0, 0.8);
            position: relative;
        }

        #typewriter::after {
            content: '|';
            display: inline-block;
            animation: blink 0.7s step-end infinite;
            color: var(--accent-color);
            margin-left: 4px;
        }

        @keyframes blink {
            50% {
                opacity: 0;
            }
        }

        /* 悬浮新闻提示 */
        #news-tooltip {
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%);
            padding: 10px 15px;
            background: rgba(0, 0, 0, 0.85);
            border: 1px solid var(--accent-color);
            border-radius: 8px;
            color: var(--text-color);
            font-size: 0.9rem;
            white-space: nowrap;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
            pointer-events: none;
            min-width: 200px;
            text-align: left;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.5);
            z-index: 3;
        }

        #earth-container:hover #news-tooltip {
            opacity: 1;
            visibility: visible;
            bottom: calc(100% + 15px);
        }

        /* --- 5. 音乐播放器 --- */
        #audio-player {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: var(--nav-bg);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            padding: 15px;
            z-index: 101;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.3);
        }

        .controls {
            display: flex;
            gap: 15px;
        }

        .controls button {
            background: none;
            border: none;
            color: var(--text-color);
            font-size: 20px;
            cursor: pointer;
            transition: color 0.3s;
        }

        .controls button:hover {
            color: var(--accent-color);
        }

        .controls button i {
            pointer-events: none;
        }

        #disk {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(to bottom, #ddd, #aaa);
            background-size: cover;
            background-position: center;
            position: relative;
            animation: rotate 5s linear infinite;
            animation-play-state: paused;
            transition: opacity 0.3s, background-image 0.3s;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.3);
        }

        #disk.playing {
            animation-play-state: running;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        #disk::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 15px;
            height: 15px;
            background-color: #555;
            border-radius: 50%;
            transform: translate(-50%, -50%);
        }

        #music-info {
            text-align: center;
        }

        .track-title {
            font-weight: bold;
            font-size: 0.9em;
        }

        .track-format {
            font-size: 0.7em;
            color: #8b949e;
            margin-top: 2px;
        }

        .track-artist {
            font-size: 0.75em;
            color: #8b949e;
        }

        /* 设置面板 */
        #settings-panel {
            position: fixed;
            bottom: 100px;
            left: 20px;
            width: 300px;
            background: var(--nav-bg);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            z-index: 103;
            display: none;
            flex-direction: column;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.3);
        }

        #settings-panel.show {
            display: flex;
        }

        .settings-header {
            padding: 15px;
            font-size: 1em;
            font-weight: 600;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .settings-header button {
            background: none;
            border: none;
            color: var(--text-color);
            cursor: pointer;
            font-size: 1em;
        }

        .settings-content {
            padding: 15px;
        }

        .settings-status {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 0.9em;
        }

        .settings-status.configured {
            background: rgba(63, 185, 80, 0.1);
            color: var(--success-green);
        }

        .settings-status i {
            font-size: 1.2em;
        }

        .settings-form .form-group {
            margin-bottom: 12px;
        }

        .settings-form label {
            display: block;
            font-size: 0.85em;
            color: #8b949e;
            margin-bottom: 5px;
        }

        .settings-form input {
            width: 100%;
            padding: 8px 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 5px;
            color: var(--text-color);
            font-size: 0.9em;
        }

        .settings-form input:focus {
            outline: none;
            border-color: var(--accent-color);
        }

        .settings-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .settings-actions button {
            flex: 1;
            padding: 8px 12px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.85em;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }

        .btn-primary {
            background: var(--accent-color);
            color: #000;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-color);
        }

        .btn-primary:hover {
            background: #79c0ff;
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        /* 歌词面板 */
        #playlist-panel {
            position: fixed;
            top: 0;
            right: -400px;
            width: 350px;
            height: 100vh;
            background: var(--nav-bg);
            backdrop-filter: blur(10px);
            border-left: 1px solid rgba(88, 166, 255, 0.1);
            z-index: 102;
            display: flex;
            flex-direction: column;
            transition: right 0.5s ease-in-out;
        }

        #playlist-panel.show {
            right: 0;
        }

        .panel-header {
            padding: 20px;
            font-size: 1.2em;
            font-weight: 600;
            border-bottom: 1px solid rgba(88, 166, 255, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .playlist-tabs {
            display: flex;
            border-bottom: 1px solid rgba(88, 166, 255, 0.1);
        }

        .playlist-tab {
            flex-grow: 1;
            text-align: center;
            padding: 10px 0;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: border-color 0.3s;
        }

        .playlist-tab.active {
            border-bottom-color: var(--accent-color);
            color: var(--accent-color);
        }

        .search-box {
            padding: 15px;
            display: flex;
            gap: 10px;
            display: none;
        }

        .search-box.show {
            display: flex;
        }

        #search-input {
            flex-grow: 1;
            padding: 8px 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 5px;
            color: var(--text-color);
        }

        #search-btn {
            background: var(--accent-color);
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
        }

        .playlist-items {
            flex-grow: 1;
            overflow-y: auto;
            padding: 10px;
            max-height: calc(100vh - 150px);
        }
        
        /* 自定义滚动条样式，去掉白边 */
        .playlist-items::-webkit-scrollbar {
            width: 8px;
        }
        
        .playlist-items::-webkit-scrollbar-track {
            background: transparent;
        }
        
        .playlist-items::-webkit-scrollbar-thumb {
            background: rgba(88, 166, 255, 0.3);
            border-radius: 4px;
        }
        
        .playlist-items::-webkit-scrollbar-thumb:hover {
            background: rgba(88, 166, 255, 0.5);
        }

        .playlist-empty {
            text-align: center;
            padding: 30px;
            color: #8b949e;
            font-size: 0.9em;
        }

        .playlist-item {
            display: flex;
            align-items: center;
            padding: 10px;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .playlist-item:hover {
            background: rgba(255, 255, 255, 0.08);
        }

        .playlist-item.active {
            background: var(--accent-color);
            color: #000;
        }

        .item-index {
            width: 30px;
            text-align: right;
            margin-right: 10px;
            opacity: 0.7;
        }

        .item-info {
            flex-grow: 1;
        }

        .item-title {
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .item-artist {
            font-size: 0.8em;
            color: #8b949e;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .item-format {
            font-size: 0.7em;
            padding: 2px 6px;
            border-radius: 4px;
            margin-left: 10px;
            display: inline-block;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .item-format.netease {
            background: var(--netease-red);
            color: #fff;
        }

        .item-format.local {
            background: rgba(255, 255, 255, 0.2);
        }

        /* 歌词容器 - 页面底部居中，无背景框 */
        #lyrics-display {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            font-family: 'Fira Code', 'Noto Sans SC', monospace;
            font-size: 1.1em;
            line-height: 2;
            z-index: 99;
            pointer-events: none;
        }

        .lyrics-line {
            transition: all 0.3s ease;
            margin: 8px 0;
        }

        .lyrics-line.prev {
            opacity: 0.6;
            font-size: 0.9em;
            /* 颜色由 JS 内联样式控制 */
        }

        .lyrics-line.active {
            opacity: 1;
            font-size: 1.3em;
            font-weight: bold;
            text-shadow: 0 0 15px var(--accent-color), 0 0 30px rgba(88, 166, 255, 0.3);
            /* 渐变颜色由 JS 内联样式控制 */
        }

        .lyrics-line.next {
            opacity: 0.5;
            font-size: 0.9em;
            /* 颜色由 JS 内联样式控制 */
        }

        .lyrics-empty {
            color: #8b949e;
            opacity: 0.4;
            font-size: 0.9em;
        }

        /* 运行统计 - 左上角 */
        #site-stats {
            position: fixed;
            top: 80px;
            left: 20px;
            font-family: 'Fira Code', monospace;
            font-size: 0.8em;
            color: rgba(255, 255, 255, 0.6);
            z-index: 100;
            line-height: 1.8;
        }

        #site-stats .stat-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        #site-stats .stat-icon {
            color: var(--accent-color);
            width: 16px;
        }

        #site-stats .stat-value {
            color: var(--accent-color);
        }

        #toast {
            position: fixed;
            bottom: -50px;
            left: 50%;
            transform: translateX(-50%);
            padding: 12px 24px;
            background: var(--nav-bg);
            backdrop-filter: blur(10px);
            color: var(--text-color);
            border: 1px solid rgba(88, 166, 255, 0.3);
            border-radius: 12px;
            font-size: 0.9rem;
            z-index: 1000;
            transition: all 0.5s ease;
            white-space: nowrap;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.5);
            font-family: 'Fira Code', 'Noto Sans SC', monospace;
        }

        #toast.show {
            bottom: 30px;
        }

        @media (max-width: 768px) {
            .nav-links {
                padding: 8px 15px;
                gap: 20px;
            }

            .nav-item {
                font-size: 0.9rem;
                letter-spacing: 1px;
            }

            #earth-container {
                width: 250px;
                height: 250px;
            }

            h1 {
                font-size: 3rem;
            }
        }

        /* 关于我页面 - 半透明背景显示星空 */
        #about-page {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 150;
            display: none;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.5s ease;
        }
        
        /* VIP 标签样式 */
        .vip-tag {
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            color: #000;
            font-size: 0.6em;
            padding: 2px 6px;
            border-radius: 3px;
            margin-left: 8px;
            font-weight: bold;
        }

        #about-page.show {
            display: flex;
            opacity: 1;
        }

        #about-page .about-text {
            font-family: 'Fira Code', 'Noto Sans SC', monospace;
            font-size: 1.5em;
            color: var(--text-color);
            text-align: center;
            overflow: hidden;
            white-space: nowrap;
        }

        #about-page .about-text span {
            display: inline-block;
            opacity: 0;
            animation: fadeInChar 0.5s ease forwards;
        }

        @keyframes fadeInChar {
            0% {
                opacity: 0;
                transform: translateX(-20px);
            }
            100% {
                opacity: 1;
                transform: translateX(0);
            }
        }

        #about-page .back-btn {
            position: absolute;
            top: 30px;
            left: 30px;
            background: none;
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: var(--text-color);
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-family: 'Fira Code', monospace;
            transition: all 0.3s;
        }

        #about-page .back-btn:hover,
        #tools-page .back-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--accent-color);
            color: var(--accent-color);
        }

        /* 工具导航页面 - 复用关于我页面样式 */
        #tools-page {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(5, 5, 5, 0.85);
            z-index: 150;
            display: none;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        #tools-page.show {
            display: flex;
            opacity: 1;
        }

        #tools-page .about-text {
            font-family: 'Fira Code', 'Noto Sans SC', monospace;
            font-size: 1.5em;
            color: var(--text-color);
            text-align: center;
            overflow: hidden;
            white-space: nowrap;
        }

        #tools-page .about-text span {
            display: inline-block;
            opacity: 0;
            animation: fadeInChar 0.5s ease forwards;
        }

        #tools-page .back-btn {
            position: absolute;
            top: 30px;
            left: 30px;
            background: none;
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: var(--text-color);
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-family: 'Fira Code', monospace;
            transition: all 0.3s;
        }
    </style>
</head>

<body>

    <!-- 1. 背景层 -->
    <div id="canvas-galaxy"></div>
    <!-- 代码打字背景容器 -->
    <div id="code-bg"></div>

    <!-- 关于我页面 -->
    <div id="about-page">
        <button class="back-btn" onclick="hideOverlayPage('about')"><i class="fas fa-arrow-left"></i> 返回</button>
        <div class="about-text" id="about-text"></div>
    </div>

    <!-- 工具导航页面 -->
    <div id="tools-page">
        <button class="back-btn" onclick="hideOverlayPage('tools')"><i class="fas fa-arrow-left"></i> 返回</button>
        <div class="about-text" id="tools-text"></div>
    </div>

    <!-- 2. UI 层 - 替换为新版导航栏 -->
    <nav>
        <div class="nav-links">
            <a href="#" class="nav-item active" data-page="home">首页</a>
            <a href="/app/" class="nav-item">托管商城</a>
            <a href="#" class="nav-item" data-page="tools">工具导航</a>
            <a href="#" class="nav-item" data-page="about">关于我</a>
        </div>
    </nav>

    <!-- 3. 主内容 (地球在中间) -->
    <main>
        <div id="earth-container">
            <canvas id="canvas-audio-ripple"></canvas> <!-- 波纹层 -->
            <div id="news-tooltip">
                [最新资讯]<br>
                🚀 3D 渲染器已上线<br>
                💬 交互动画响应中...
            </div>

        // ==========================================

        function typeQuote() {
            if (!quoteElement) return;
            const currentQuote = quotes[quoteIndex];
            if (isDeleting) {
                quoteElement.textContent = currentQuote.substring(0, charIndex - 1);
                charIndex--;
            } else {
                quoteElement.textContent = currentQuote.substring(0, charIndex + 1);
                charIndex++;
            }
            let speed = isDeleting ? 50 : 100;
            if (!isDeleting && charIndex === currentQuote.length) {
                isDeleting = true; speed = 2000;
            } else if (isDeleting && charIndex === 0) {
                isDeleting = false; quoteIndex = (quoteIndex + 1) % quotes.length; speed = 500;

        // ==========================================

        let bgScene, bgCamera, bgRenderer, stars;

        // ==========================================

        const earthContainer = document.getElementById('earth-container');

        function initEarth() {

            earthScene = new THREE.Scene();

            const material = new THREE.MeshStandardMaterial({
                color: 0x2e8b57,

            });

            earthScene.add(ambientLight);

        // 统一动画循环
        function animateAll() {
            requestAnimationFrame(animateAll);

            // 地球自转
            if (earthMesh) earthMesh.rotation.y += 0.0015;

            // 星空转动
            if (stars) {
                stars.rotation.y += 0.0001;

            // 渲染
            if (bgRenderer && bgScene && bgCamera) bgRenderer.render(bgScene, bgCamera);
            if (earthRenderer && earthScene && earthCamera) earthRenderer.render(earthScene, earthCamera);
        }

        // 窗口 Resize
        function onResize() {
            if (earthContainer && earthRenderer && earthCamera) {
                const width = earthContainer.clientWidth;
                const height = earthContainer.clientHeight;
                earthCamera.aspect = width / height;
                earthCamera.updateProjectionMatrix();
                earthRenderer.setSize(width, height);
            }
            if (bgRenderer && bgCamera) {
                const windowWidth = window.innerWidth;

        // ==========================================
        // 6. 原有逻辑：音频波纹 (Web Audio API)
        // ==========================================
        const audio = document.getElementById('audio-source');
        const rippleCanvas = document.getElementById('canvas-audio-ripple');
        let rippleCtx, audioContext, analyser, dataArray;
        let rippleWidth, rippleHeight;
        const RIPPLE_CENTER_OFFSET = 0;
        const EARTH_RADIUS_PULSE = 135;
        const rippleChars = ['<dev/>', 'fun()', ';', '#', '{', '}', '101'];

        function initRipple() {
            if (!rippleCanvas) return;
            rippleWidth = rippleCanvas.width = rippleCanvas.clientWidth || 300;
            rippleHeight = rippleCanvas.height = rippleCanvas.clientHeight || 300;
            rippleCtx = rippleCanvas.getContext('2d');

            if (window.AudioContext && !audioContext) {
                try {
                    audioContext = new (window.AudioContext || window.webkitAudioContext)();
                    const source = audioContext.createMediaElementSource(audio);
                    analyser = audioContext.createAnalyser();
                    source.connect(analyser);
                    analyser.connect(audioContext.destination);
                    analyser.fftSize = 256;
                    dataArray = new Uint8Array(analyser.frequencyBinCount);
                } catch (e) { console.warn("Audio API Init Failed", e); }
            }
        }

        document.addEventListener('play', () => {
            if (audioContext && audioContext.state === 'suspended') audioContext.resume();
        }, true);

        function animateRipple() {
            requestAnimationFrame(animateRipple);
            if (!rippleCtx || !analyser || !dataArray) return;

            rippleCtx.clearRect(0, 0, rippleWidth, rippleHeight);
            analyser.getByteFrequencyData(dataArray);

            let bassSum = 0;
            for (let i = 0; i < 5; i++) { bassSum += dataArray[i]; }
            const bassVolume = bassSum / 5;

            let beatPulse = 0;
            if (!audio.paused) {
                beatPulse = Math.min(1.0, (bassVolume / 200) * 2.0);
                beatPulse = Math.max(0, beatPulse * 1.5 - 0.5);
            }

            if (beatPulse > 0.01) {
                const center = { x: rippleWidth / 2, y: rippleHeight / 2 };
                drawCodeRing(center, EARTH_RADIUS_PULSE + beatPulse * 60, beatPulse * 0.8, 40);
                drawCodeRing(center, EARTH_RADIUS_PULSE + beatPulse * 40, beatPulse * 0.6, 25);

                rippleCtx.beginPath();
                rippleCtx.arc(center.x, center.y, EARTH_RADIUS_PULSE, 0, Math.PI * 2);
                rippleCtx.strokeStyle = 'rgba(88, 166, 255, 0.5)';
                rippleCtx.lineWidth = 1 + beatPulse * 5;
                rippleCtx.stroke();
            }
        }

        function drawCodeRing(center, radius, pulseIntensity, density) {
            rippleCtx.globalAlpha = pulseIntensity * 0.5;
            rippleCtx.fillStyle = 'var(--accent-color)';
            rippleCtx.font = "bold 12px 'Fira Code'";

            for (let i = 0; i < density; i++) {
                const angle = (Math.PI * 2 / density) * i + Date.now() * 0.0001;
                const char = rippleChars[i % rippleChars.length];
                const x = center.x + Math.cos(angle) * radius;
                const y = center.y + Math.sin(angle) * radius * 0.8;
                rippleCtx.fillText(char, x, y);
            }
            rippleCtx.globalAlpha = 1;
        }

        // ==========================================
        // 7. 原有逻辑：新闻模拟
        // ==========================================
        const newsTooltip = document.getElementById('news-tooltip');
        let newsSimulated = [

        // ==========================================
        // 8. 音乐播放器完整功能 (修复版)
        // ==========================================
        const toastEl = document.getElementById('toast');
        let toastTimeout = null;
        
        function showToast(message, type = 'info', duration = 3000) {
            if (!toastEl) return;
            
            // 清除之前的定时器

        // 播放器状态
        let playerState = {
            mode: 'local',           // 'local' 或 'online'
            localPlaylist: [],       // 本地播放列表
            onlinePlaylist: [],      // 在线播放列表

        };

        // localStorage 键名
        const PLAYER_STORAGE_KEY = 'musicPlayerState';

        // 保存状态到 localStorage
        function savePlayerState() {

        // 文件名解析（内联简化版）
        function parseTrackName(filename) {
            if (!filename) return { artist: '未知艺术家', title: '未知歌曲', format: '' };
            const lastDot = filename.lastIndexOf('.');
            const format = lastDot > 0 ? filename.substring(lastDot + 1).toLowerCase() : '';
            const name = lastDot > 0 ? filename.substring(0, lastDot) : filename;
            
            const separators = [' - ', '- ', ' -', '-'];
            for (const sep of separators) {
                const idx = name.indexOf(sep);
                if (idx > 0 && idx < name.length - sep.length) {
                    const left = name.substring(0, idx).trim();
                    const right = name.substring(idx + sep.length).trim();
                    if (left && right) {
                        // 简单判断：如果右边包含常见艺术家名，则右边是艺术家
                        const knownArtists = ['周杰伦', '华晨宇', '林俊杰', '陈奕迅', '邓紫棋'];
                        if (knownArtists.some(a => right.includes(a))) {
                            return { artist: right, title: left, format };
                        }
                        return { artist: left, title: right, format };
                    }
                }
            }
            return { artist: '未知艺术家', title: name.trim(), format };
        }

        // LRC 歌词解析
        function parseLRC(lrcContent) {
            if (!lrcContent) return [];
            const lines = lrcContent.split('\n');
            const lyrics = [];
            const timeRegex = /\[(\d{1,2}):(\d{2})(?:[.:](\d{1,3}))?\]/g;
            
            for (const line of lines) {
                const trimmed = line.trim();
                if (!trimmed || /^\[[a-z]{2}:/.test(trimmed)) continue;
                
                const timestamps = [];
                let match, lastIdx = 0;
                while ((match = timeRegex.exec(trimmed)) !== null) {
                    const mins = parseInt(match[1], 10);
                    const secs = parseInt(match[2], 10);
                    const ms = match[3] ? parseInt(match[3].padEnd(3, '0'), 10) : 0;
                    timestamps.push(mins * 60 + secs + ms / 1000);
                    lastIdx = match.index + match[0].length;
                }
                timeRegex.lastIndex = 0;
                
                const text = trimmed.substring(lastIdx).trim();
                timestamps.forEach(time => text && lyrics.push({ time, text }));
            }
            return lyrics.sort((a, b) => a.time - b.time);
        }

        // 获取当前歌词索引
        function getCurrentLyricIndex(lyrics, currentTime) {
            if (!lyrics || !lyrics.length) return -1;
            let idx = -1;
            for (let i = 0; i < lyrics.length; i++) {
                if (lyrics[i].time <= currentTime) idx = i;
                else break;
            }
            return idx;
        }

        // 获取后端 API 基础 URL
        function getBackendApiBase() {
            // 如果当前是 localhost 或 127.0.0.1，使用 localhost:8999
            const hostname = window.location.hostname;
            if (hostname === 'localhost' || hostname === '127.0.0.1' || hostname === '[::]' || hostname === '::1') {
                return 'http://localhost:8999';
            }
            // 否则使用相同的 hostname，但端口改为 8999
            return `${window.location.protocol}//${hostname}:8999`;
        }

        // Music API - 使用后端代理 API
        const MusicAPI = {
            // 后端代理 API 基础 URL
            backendApiBase: getBackendApiBase(),
            // 主 API (通过后端代理)
            get metingUrl() {
                return `${this.backendApiBase}/api/meting`;
            },
            // 重试配置
            maxRetries: 3,
            retryDelays: [0, 1000, 2000], // 重试延迟（毫秒）
            
            // 延迟函数
            delay(ms) {
                return new Promise(resolve => setTimeout(resolve, ms));
            },
            
            async search(keyword, limit = 30) {
                // 使用后端代理 API 搜索端点，支持重试
                if (!keyword || !keyword.trim()) {
                    return { success: false, error: '搜索关键词不能为空', results: [] };
                }
                
                let lastError = null;
                
                // 重试循环
                for (let attempt = 0; attempt < this.maxRetries; attempt++) {
                    try {
                        // 如果不是第一次尝试，显示重试消息并等待
                        if (attempt > 0) {
                            showToast(`网络不稳定，正在重试 (${attempt}/${this.maxRetries - 1})...`, 'info');
                            await this.delay(this.retryDelays[attempt]);
                        }
                        
                        const url = `${this.metingUrl}?type=search&s=${encodeURIComponent(keyword.trim())}&server=netease`;
                        console.log(`[MUSIC-SEARCH] 尝试 ${attempt + 1}/${this.maxRetries}: ${url}`);
                        
                        const res = await fetch(url, {
                            method: 'GET',
                            headers: {
                                'Accept': 'application/json',
                                'Content-Type': 'application/json'
                            },
                            signal: AbortSignal.timeout(15000) // 15秒超时（后端需要尝试多个服务器）
                        });
                        
                        // 读取响应
                        const text = await res.text();
                        const textTrimmed = text.trim();
                        
                        // 检查是否是 HTML 错误页面
                        if (textTrimmed.startsWith('<!DOCTYPE') || textTrimmed.startsWith('<html') || textTrimmed.startsWith('<?xml')) {
                            console.error('[MUSIC-SEARCH] 收到HTML响应');
                            throw new Error('后端服务配置错误');
                        }
                        
                        // 检查HTTP状态
                        if (!res.ok) {
                            console.error(`[MUSIC-SEARCH] HTTP ${res.status}`);
                            throw new Error(`服务器错误 (${res.status})`);
                        }
                        
                        // 解析JSON
                        let data;
                        try {
                            data = JSON.parse(text);
                        } catch (parseError) {
                            console.error('[MUSIC-SEARCH] JSON解析失败');
                            throw new Error('服务器响应格式错误');
                        }
                        
                        // 检查后端返回的错误
                        if (data && data.error) {
                            // 如果是服务不可用的错误，且还有重试机会，继续重试
                            if (data.code >= 500 && attempt < this.maxRetries - 1) {
                                throw new Error(data.error);
                            }
                            // 否则返回错误
                            return { success: false, error: data.error, results: [], code: data.code };
                        }
                        
                        // 返回成功结果
                        const results = Array.isArray(data) ? data.slice(0, limit) : [];
                        console.log(`[MUSIC-SEARCH] 成功: ${results.length} 首歌曲`);
                        return { success: true, results, error: null };
                        
                    } catch (e) {
                        lastError = e;
                        console.error(`[MUSIC-SEARCH] 尝试 ${attempt + 1} 失败:`, e.message);
                        
                        // 如果是最后一次尝试，不再重试
                        if (attempt === this.maxRetries - 1) {
                            break;
                        }
                    }
                }
                
                // 所有重试都失败
                return { 
                    success: false, 
                    error: lastError?.message || '音乐搜索服务暂时不可用，请稍后重试',
                    results: []
                };
            },
            
            async getHotSongs() {
                try {
                    const url = `${this.metingUrl}?type=playlist&id=3778678&server=netease`;
                    const res = await fetch(url, { signal: AbortSignal.timeout(15000) });
                    if (!res.ok) throw new Error('API 请求失败');
                    return await res.json();
                } catch (e) {
                    console.error('获取热门歌曲失败:', e);
                    return [];
                }
            },
            
            async getLyrics(songId) {
                // 使用后端 /api/meting?type=lrc 获取歌词
                try {
                    const url = `${this.metingUrl}?type=lrc&id=${songId}&server=netease`;
                    console.log(`[MUSIC-API] 获取歌词: ${songId}`);
                    const res = await fetch(url, { signal: AbortSignal.timeout(10000) });
                    if (!res.ok) return '';
                    const text = await res.text();
                    return text || '';
                } catch (e) {
                    console.error('获取歌词失败:', e);
                    return '';
                }
            },
            
            async getSongUrl(songId) {
                // 使用后端 /api/meting?type=url 获取播放链接
                try {
                    const url = `${this.metingUrl}?type=url&id=${songId}&server=netease`;
                    console.log(`[MUSIC-API] 获取播放链接: ${songId}`);
                    const res = await fetch(url, { signal: AbortSignal.timeout(10000) });
                    if (!res.ok) return '';
                    const data = await res.json();
                    return data?.url || '';
                } catch (e) {
                    console.error('获取播放链接失败:', e);
                    return '';
                }
            },
            
            async searchLyrics(keyword) {
                try {
                    // 先搜索歌曲获取歌词
                    const results = await this.search(keyword);
                    if (results.success && results.results.length > 0) {

                        }
                    }
                } catch (e) { console.error('搜索歌词失败:', e); }
                return '';
            }
        };

        // DOM 元素
        const playBtn = document.getElementById('play-btn');
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');
        const disk = document.getElementById('disk');
        const playlistPanel = document.getElementById('playlist-panel');
        const playlistItems = document.getElementById('playlist-items');
        const searchBox = document.getElementById('search-box');
        const lyricsContainer = document.getElementById('lyrics-display');
        const tabs = document.querySelectorAll('.playlist-tab');
        const runTimeEl = document.getElementById('run-time');
        const visitCountEl = document.getElementById('visit-count');

        // 获取当前播放列表
        function getCurrentPlaylist() {
            return playerState.mode === 'local' ? playerState.localPlaylist : playerState.onlinePlaylist;
        }

        // 更新播放器 UI
        function updatePlayerUI() {
            if (playBtn) playBtn.innerHTML = playerState.isPlaying ? '<i class="fas fa-pause"></i>' : '<i class="fas fa-play"></i>';
            if (disk) disk.classList.toggle('playing', playerState.isPlaying);
        }

        // 歌词进度计算（内联版本）
        const LYRICS_BLUE = '#58a6ff';
        const LYRICS_GRAY = 'rgba(255, 255, 255, 0.5)';
        
        function calculateLyricProgress(currentTime, lineStartTime, lineEndTime) {
            if (lineEndTime <= lineStartTime) {
                return currentTime >= lineStartTime ? 100 : 0;
            }
            if (currentTime < lineStartTime) return 0;
            if (currentTime >= lineEndTime) return 100;
            return Math.min(100, Math.max(0, ((currentTime - lineStartTime) / (lineEndTime - lineStartTime)) * 100));
        }
        
        function generateGradientStyle(progress) {
            const p = Math.min(100, Math.max(0, progress));
            return `linear-gradient(to right, ${LYRICS_BLUE} ${p}%, ${LYRICS_GRAY} ${p}%)`;
        }
        
        function getLyricEndTime(lyrics, index) {
            if (index < lyrics.length - 1) return lyrics[index + 1].time;
            return lyrics[index].time + 3; // 默认3秒
        }

        // 更新歌词显示 - 只显示三行，带渐变进度
        function updateLyricsDisplay() {
            if (!lyricsContainer) return;
            
            if (!playerState.currentLyrics || playerState.currentLyrics.length === 0) {
                lyricsContainer.innerHTML = '<div class="lyrics-empty">♪ 暂无歌词 ♪</div>';
                return;
            }
            
            const currentTime = audio.currentTime;
            const currentIdx = getCurrentLyricIndex(playerState.currentLyrics, currentTime);
            
            if (currentIdx < 0) {
                lyricsContainer.innerHTML = '<div class="lyrics-empty">♪ 等待播放 ♪</div>';
                return;
            }
            
            // 只显示三行：上一行、当前行、下一行
            let html = '';
            const lyrics = playerState.currentLyrics;
            
            // 上一行（已播放完，蓝色）
            if (currentIdx > 0 && lyrics[currentIdx - 1].text) {
                html += `<div class="lyrics-line prev" style="color: ${LYRICS_BLUE};">${lyrics[currentIdx - 1].text}</div>`;
            }
            
            // 当前行（渐变进度）
            if (lyrics[currentIdx].text) {
                const startTime = lyrics[currentIdx].time;
                const endTime = getLyricEndTime(lyrics, currentIdx);
                const progress = calculateLyricProgress(currentTime, startTime, endTime);
                const gradientStyle = generateGradientStyle(progress);
                
                html += `<div class="lyrics-line active" style="background: ${gradientStyle}; -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;">${lyrics[currentIdx].text}</div>`;
            }
            
            // 下一行（未播放，灰白色）
            if (currentIdx < lyrics.length - 1 && lyrics[currentIdx + 1].text) {
                html += `<div class="lyrics-line next" style="color: ${LYRICS_GRAY};">${lyrics[currentIdx + 1].text}</div>`;
            }
            
            lyricsContainer.innerHTML = html || '<div class="lyrics-empty">♪ ♪ ♪</div>';
        }

        // 开始歌词同步
        function startLyricsSync() {
            stopLyricsSync();
            playerState.lyricsTimer = setInterval(updateLyricsDisplay, 200);
        }

        // 停止歌词同步
        function stopLyricsSync() {
            if (playerState.lyricsTimer) {
                clearInterval(playerState.lyricsTimer);
                playerState.lyricsTimer = null;
            }
        }

        // 加载歌词
        async function loadLyrics(track) {
            playerState.currentLyrics = [];
            
            if (!track) {
                updateLyricsDisplay();
                return;
            }
            
            try {
                let lrcContent = '';
                
                // 只有在线音乐才加载歌词
                if (playerState.mode === 'online') {
                    const songId = track.id;
                    
                    if (songId) {
                        // 使用后端 API 获取歌词
                        console.log(`[MUSIC-PLAYER] 加载歌词: ${songId}`);
                        lrcContent = await MusicAPI.getLyrics(songId);
                    } else if (track.lrc) {
                        // 如果有直接的歌词 URL，尝试获取
                        try {
                            const res = await fetch(track.lrc, { signal: AbortSignal.timeout(8000) });
                            if (res.ok) {
                                lrcContent = await res.text();
                            }
                        } catch (e) {
                            console.warn('直接获取歌词失败:', e);
                        }
                    }
                    
                    if (lrcContent) {
                        playerState.currentLyrics = parseLRC(lrcContent);
                        console.log(`[MUSIC-PLAYER] 歌词加载成功: ${playerState.currentLyrics.length} 行`);
                    }
                }
                // 本地音乐不加载在线歌词，显示"暂无歌词"
            } catch (e) {
                console.error('加载歌词失败:', e);
            }
            
            updateLyricsDisplay();
        }

        // 默认唱片样式
        const DEFAULT_DISK_STYLE = 'linear-gradient(to bottom, #ddd, #aaa)';
        
        // 更新专辑封面
        function updateAlbumCover(track) {
            const diskEl = document.getElementById('disk');
            if (!diskEl) return;
            
            // 获取封面 URL（在线音乐有 pic 属性）
            const coverUrl = track?.pic || track?.cover || null;
            
            if (coverUrl) {
                // 预加载图片
                const img = new Image();
                img.onload = () => {
                    diskEl.style.background = `url('${coverUrl}') center/cover`;
                };
                img.onerror = () => {
                    // 加载失败，使用默认样式
                    diskEl.style.background = DEFAULT_DISK_STYLE;
                };
                img.src = coverUrl;
            } else {
                // 无封面，使用默认样式
                diskEl.style.background = DEFAULT_DISK_STYLE;
            }
        }

        // 播放状态标志，防止重复调用
        let isPlayingTrack = false;
        let nextTrackTimer = null;

        // 播放曲目
        async function playTrack(index) {
            const playlist = getCurrentPlaylist();
            if (!playlist[index]) return;
            
            // 防止重复调用
            if (isPlayingTrack) {
                console.log('[MUSIC-PLAYER] 正在切换曲目，忽略重复请求');
                return;
            }
            
            // 清除之前的自动下一首定时器
            if (nextTrackTimer) {
                clearTimeout(nextTrackTimer);
                nextTrackTimer = null;
            }
            
            isPlayingTrack = true;
            
            try {
                playerState.index = index;
                const track = playlist[index];
                
                // 先停止当前播放并清空源
                audio.pause();
                audio.src = '';
                audio.load(); // 重置音频元素
                
                // 等待一小段时间，确保之前的请求完全停止
                await new Promise(resolve => setTimeout(resolve, 100));
                
                // 获取音频源
                let src = '';
                if (playerState.mode === 'local') {
                    src = track.path || `musics/${track.filename}`;
                } else {
                    // 在线音乐：检查是否需要动态获取播放链接
                    src = track.url;
                    
                    // 如果 url 是 API 端点格式或为空，需要获取真实播放链接
                    if (!src || src.includes('/song/url')) {
                        const songId = track.id;
                        if (songId) {
                            showToast('正在获取播放链接...', 'info', 2000);
                            console.log(`[MUSIC-PLAYER] 获取播放链接: ${songId}`);
                            src = await MusicAPI.getSongUrl(songId);
                            
                            // 更新缓存的 URL
                            if (src) {
                                track.url = src;
                            }
                        }
                    }
                }
                
                if (!src) {
                    showToast('无法获取音频源，可能是版权限制', 'error');
                    // 自动跳到下一首（延迟更长时间，避免快速循环）
                    nextTrackTimer = setTimeout(() => {
                        nextTrackTimer = null;
                        isPlayingTrack = false;
                        nextTrack();
                    }, 2000);
                    return;
                }
                
                // 设置新的音频源
                audio.src = src;
                
                // 等待音频加载
                await new Promise((resolve, reject) => {
                    const onCanPlay = () => {
                        audio.removeEventListener('canplay', onCanPlay);
                        audio.removeEventListener('error', onError);
                        resolve();
                    };
                    const onError = (e) => {
                        audio.removeEventListener('canplay', onCanPlay);
                        audio.removeEventListener('error', onError);
                        reject(new Error('音频加载失败'));
                    };
                    audio.addEventListener('canplay', onCanPlay);
                    audio.addEventListener('error', onError);
                    
                    // 设置超时
                    setTimeout(() => {
                        audio.removeEventListener('canplay', onCanPlay);
                        audio.removeEventListener('error', onError);
                        reject(new Error('音频加载超时'));
                    }, 10000);
                });
                
                // 播放音频
                await audio.play();
                playerState.isPlaying = true;
                updatePlayerUI();
                savePlayerState();
                
                // 更新曲目信息
                const title = track.title || track.name || '未知歌曲';
                const artist = track.artist || '未知艺术家';
                document.getElementById('music-info').innerHTML = 
                    `<div class="track-title">${title}</div><div class="track-artist">${artist}</div><div class="track-format">${track.format || ''}</div>`;
                
                // 更新专辑封面
                updateAlbumCover(track);
                
                // 高亮当前曲目
                highlightCurrentTrack();
                
                // 加载歌词
                loadLyrics(track);
                startLyricsSync();
                
            } catch (e) {
                console.error('播放失败:', e);
                
                // 如果是AbortError，说明是被新请求中断，不显示错误
                if (e.name === 'AbortError') {
                    console.log('[MUSIC-PLAYER] 播放请求被中断（正常情况）');
                    return;
                }
                
                showToast('播放失败，可能是版权限制', 'error');
                // 自动跳到下一首（延迟更长时间，避免快速循环）
                nextTrackTimer = setTimeout(() => {
                    nextTrackTimer = null;
                    isPlayingTrack = false;
                    nextTrack();
                }, 2000);
            } finally {
                // 如果不是因为自动下一首而返回，重置标志
                if (!nextTrackTimer) {
                    isPlayingTrack = false;
                }
            }
        }

        // 上一曲
        function prevTrack() {
            const playlist = getCurrentPlaylist();
            if (playlist.length === 0) return;
            playerState.index = (playerState.index - 1 + playlist.length) % playlist.length;
            playTrack(playerState.index);
        }

        // 下一曲
        function nextTrack() {
            const playlist = getCurrentPlaylist();
            if (playlist.length === 0) return;
            playerState.index = (playerState.index + 1) % playlist.length;
            playTrack(playerState.index);
        }

        // 高亮当前曲目
        function highlightCurrentTrack() {
            const items = playlistItems.querySelectorAll('.playlist-item');
            items.forEach((item, i) => {
                item.classList.toggle('active', i === playerState.index);
            });
        }

        // 渲染播放列表
        function renderPlaylist(list, isLocal = true) {
            if (!list || list.length === 0) {
                const emptyIcon = isLocal ? 'fa-folder-open' : 'fa-search';
                const emptyText = isLocal ? '暂无本地音乐' : '暂无搜索结果';
                playlistItems.innerHTML = `<div class="playlist-empty"><i class="fas ${emptyIcon}"></i> ${emptyText}</div>`;
                document.getElementById('playlist-count').innerText = '0';
                return;
            }
            
            playlistItems.innerHTML = list.map((item, i) => {
                const title = item.title || item.name || '未知歌曲';
                const artist = item.artist || '未知艺术家';
                const format = item.format || (isLocal ? '' : '网易云');
                const formatClass = isLocal ? 'local' : 'netease';
                
                return `
                    <div class="playlist-item ${i === playerState.index && playerState.mode === (isLocal ? 'local' : 'online') ? 'active' : ''}" onclick="playTrack(${i})">
                        <span class="item-index">${i + 1}</span>
                        <div class="item-info">
                            <div class="item-title">${title}</div>
                            <div class="item-artist">${artist}</div>
                        </div>
                        <span class="item-format ${formatClass}">${format}</span>
                    </div>
                `;
            }).join('');
            
            document.getElementById('playlist-count').innerText = list.length;
        }

        // 切换标签页
        function switchTab(mode) {
            playerState.mode = mode;
            
            // 更新标签高亮
            tabs.forEach(tab => {
                tab.classList.toggle('active', tab.dataset.tab === mode);
            });
            
            // 显示/隐藏搜索框
            if (searchBox) {
                searchBox.classList.toggle('show', mode === 'online');
            }
            
            // 渲染对应的播放列表
            if (mode === 'local') {
                renderPlaylist(playerState.localPlaylist, true);
            } else {
                // 如果在线列表为空，先显示加载状态，再加载热门歌曲
                if (playerState.onlinePlaylist.length === 0) {
                    // 立即显示加载状态，避免显示本地列表
                    playlistItems.innerHTML = '<div class="playlist-empty"><i class="fas fa-spinner fa-spin"></i> 正在加载在线音乐...</div>';
                    document.getElementById('playlist-count').innerText = '0';
                    // 然后加载热门歌曲
                    loadHotSongs();
                } else {
                    renderPlaylist(playerState.onlinePlaylist, false);
                }
            }
            
            savePlayerState();
        }
        
        // 加载热门歌曲
        async function loadHotSongs() {
            showToast('正在加载热门歌曲...', 'info');
            try {
                const results = await MusicAPI.getHotSongs();
                if (results && results.length > 0) {
                    playerState.onlinePlaylist = results.map(item => ({
                        ...item,
                        title: item.name,
                        format: '网易云'
                    }));
                    renderPlaylist(playerState.onlinePlaylist, false);
                    showToast(`✓ 已加载 ${results.length} 首热门歌曲`, 'success');
                } else {
                    showToast('暂无热门歌曲', 'info');
                }
            } catch (e) {
                console.error('[MUSIC-API] 加载热门歌曲失败:', e);
                showToast('🔧 音乐服务暂时不可用', 'error');
            }
        }

        // 加载本地播放列表
        async function loadLocalPlaylist() {
            try {
                const res = await fetch('playlist.json');
                if (!res.ok) throw new Error('加载失败');
                const data = await res.json();
                
                // 重新解析文件名以修复格式问题
                playerState.localPlaylist = (data.tracks || []).map(track => {
                    const parsed = parseTrackName(track.filename);
                    return {
                        ...track,
                        artist: parsed.artist,
                        title: parsed.title,
                        format: parsed.format || track.format
                    };
                });
                
                if (playerState.mode === 'local') {
                    renderPlaylist(playerState.localPlaylist, true);
                }
                
                showToast(`已加载 ${playerState.localPlaylist.length} 首本地音乐`);
            } catch (e) {
                console.error('加载本地播放列表失败:', e);
                playerState.localPlaylist = [];
                if (playerState.mode === 'local') {
                    playlistItems.innerHTML = '<div class="playlist-empty"><i class="fas fa-folder-open"></i> 暂无本地音乐</div>';
                }
            }
        }

        // 搜索在线音乐
        async function searchOnlineMusic(keyword) {
            if (!keyword || !keyword.trim()) {
                showToast('请输入搜索关键词', 'error');
                return;
            }
            
            console.log('[MUSIC-SEARCH] 搜索:', keyword);
            
            // 显示搜索中状态
            showToast('正在搜索...', 'info');
            
            // 立即显示加载状态，避免显示之前的列表
            if (playerState.mode === 'online') {
                playlistItems.innerHTML = '<div class="playlist-empty"><i class="fas fa-spinner fa-spin"></i> 正在搜索...</div>';
                document.getElementById('playlist-count').innerText = '0';
            }
            
            // 禁用搜索按钮
            const searchBtn = document.getElementById('search-btn');
            if (searchBtn) {
                searchBtn.disabled = true;
                searchBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 搜索中';
            }
            
            try {
                const result = await MusicAPI.search(keyword);
                
                if (result.success && result.results.length > 0) {
                    console.log(`[MUSIC-SEARCH] 成功: ${result.results.length} 首歌曲`);
                    
                    playerState.onlinePlaylist = result.results.map(item => ({
                        ...item,
                        title: item.name,
                        format: '网易云'
                    }));
                    
                    if (playerState.mode === 'online') {
                        renderPlaylist(playerState.onlinePlaylist, false);
                    }
                    
                    showToast(`✓ 找到 ${result.results.length} 首歌曲`, 'success');
                } else if (!result.success) {
                    // 搜索失败，显示错误信息
                    console.error('[MUSIC-SEARCH] 失败:', result.error);
                    
                    let errorMsg = '搜索失败';
                    if (result.code === 504) {
                        errorMsg = '⏱ 搜索超时，请检查网络连接';
                    } else if (result.code >= 500) {
                        errorMsg = '🔧 音乐服务暂时不可用，请稍后再试';
                    } else if (result.error) {
                        errorMsg = `⚠ ${result.error}`;
                    }
                    
                    showToast(errorMsg, 'error');
                    playerState.onlinePlaylist = [];
                    if (playerState.mode === 'online') {
                        renderPlaylist([], false);
                    }
                } else {
                    // 没有结果
                    console.log('[MUSIC-SEARCH] 无结果');
                    showToast(`🔍 没有找到 "${keyword}" 相关的歌曲`, 'info');
                    playerState.onlinePlaylist = [];
                    if (playerState.mode === 'online') {
                        renderPlaylist([], false);
                    }
                }
            } catch (e) {
                console.error('[MUSIC-SEARCH] 意外错误:', e);
                showToast('⚠ 搜索出错，请稍后重试', 'error');
                playerState.onlinePlaylist = [];
                if (playerState.mode === 'online') {
                    renderPlaylist([], false);
                }
            } finally {
                // 恢复搜索按钮
                if (searchBtn) {
                    searchBtn.disabled = false;
                    searchBtn.innerHTML = '<i class="fas fa-search"></i>搜索';
                }
            }
        }

        // 绑定事件
        document.addEventListener('DOMContentLoaded', () => {
            initGalaxy();
            initEarth();
            initRipple();
            animateAll();
            animateRipple();
            typeQuote();

            // 恢复状态
            restorePlayerState();
            audio.volume = playerState.volume;

            // 播放/暂停按钮
            if (playBtn) playBtn.addEventListener('click', () => {
                if (audio.src && audio.src !== window.location.href) {
                    if (audio.paused) {
                        audio.play();
                        playerState.isPlaying = true;
                        startLyricsSync();
                    } else {
                        audio.pause();
                        playerState.isPlaying = false;
                        stopLyricsSync();
                    }
                    updatePlayerUI();
                } else {
                    // 没有选择歌曲，播放第一首
                    const playlist = getCurrentPlaylist();
                    if (playlist.length > 0) {
                        playTrack(0);
                    } else {
                        showToast('请先选择歌曲');
                    }
                }
            });

            // 上一曲/下一曲
            if (prevBtn) prevBtn.addEventListener('click', prevTrack);
            if (nextBtn) nextBtn.addEventListener('click', nextTrack);

            // 播放列表面板
            document.getElementById('playlist-btn').addEventListener('click', (e) => {
                e.stopPropagation();
                playlistPanel.classList.toggle('show');
            });
            document.getElementById('close-panel-btn').addEventListener('click', () => {
                playlistPanel.classList.remove('show');
            });

            // 标签页切换
            tabs.forEach(tab => {
                tab.addEventListener('click', () => switchTab(tab.dataset.tab));
            });

            // 搜索功能
            document.getElementById('search-btn').addEventListener('click', () => {
                const keyword = document.getElementById('search-input').value.trim();
                searchOnlineMusic(keyword);
            });
            
            document.getElementById('search-input').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    const keyword = e.target.value.trim();
                    searchOnlineMusic(keyword);
                }
            });

            // 音频事件
            audio.addEventListener('ended', nextTrack);
            audio.addEventListener('error', () => {
                showToast('音频加载失败', 'error');
                setTimeout(() => nextTrack(), 1500);
            });

            // 初始化：优先加载本地播放列表
            loadLocalPlaylist();
            
            // 初始化标签页状态
            switchTab(playerState.mode);

            // 初始化运行统计
            initSiteStats();
            
            // 初始化网易云账号设置
            initAccountSettings();

            window.addEventListener('resize', onResize);
            onResize();
        });

        // ==========================================
        // 网易云账号设置
        // ==========================================

        };
        
        function saveAccountConfig(config) {
            try {
                const data = {
                    enabled: !!config.enabled,
                    userId: config.userId || '',
                    cookie: config.cookie || '',
                    configuredAt: Date.now()
                };
                localStorage.setItem(ACCOUNT_CONFIG_KEY, JSON.stringify(data));
                return true;
            } catch (e) {
                console.warn('保存账号配置失败:', e);
                return false;
            }
        }
        
        function loadAccountConfig() {
            // 优先检查用户自定义配置
            try {
                const userConfig = localStorage.getItem(ACCOUNT_CONFIG_KEY);
                if (userConfig) {
                    const parsed = JSON.parse(userConfig);
                    // 如果用户配置已启用，使用用户配置
                    if (parsed.enabled) {
                        return parsed;
                    }
                }
            } catch (e) {
                console.warn('加载用户配置失败:', e);
            }
            
            // 否则返回默认硬编码配置
            return DEFAULT_NETEASE_CONFIG;
        }
        
        function clearAccountConfig() {
            try {
                localStorage.removeItem(ACCOUNT_CONFIG_KEY);
                return true;
            } catch (e) {
                console.warn('清除账号配置失败:', e);
                return false;
            }
        }
        
        function updateAccountStatus() {
            const statusEl = document.getElementById('account-status');
            const config = loadAccountConfig();
            
            // 检查是否使用用户自定义配置
            let isUserConfig = false;
            try {
                const userConfig = localStorage.getItem(ACCOUNT_CONFIG_KEY);
                if (userConfig) {
                    const parsed = JSON.parse(userConfig);
                    if (parsed.enabled) {
                        isUserConfig = true;
                    }
                }
            } catch (e) {
                // 忽略错误
            }
            
            if (config && config.enabled && config.userId) {
                const configType = isUserConfig ? '用户配置' : '默认配置';
                statusEl.innerHTML = `<i class="fas fa-check-circle"></i><span>已配置: ${config.userId} (${configType})</span>`;
                statusEl.classList.add('configured');
            } else {
                statusEl.innerHTML = `<i class="fas fa-user-circle"></i><span>未配置账号</span>`;
                statusEl.classList.remove('configured');
            }
        }
        
        function initAccountSettings() {
            const settingsPanel = document.getElementById('settings-panel');
            const settingsBtn = document.getElementById('settings-btn');
            const closeSettingsBtn = document.getElementById('close-settings-btn');
            const saveBtn = document.getElementById('save-account-btn');
            const clearBtn = document.getElementById('clear-account-btn');
            const userIdInput = document.getElementById('netease-userid');
            const cookieInput = document.getElementById('netease-cookie');
            
            // 打开/关闭设置面板
            settingsBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                settingsPanel.classList.toggle('show');
                if (settingsPanel.classList.contains('show')) {
                    // 加载已保存的配置
                    const config = loadAccountConfig();
                    
                    // 检查是否使用用户自定义配置
                    let isUserConfig = false;
                    try {
                        const userConfig = localStorage.getItem(ACCOUNT_CONFIG_KEY);
                        if (userConfig) {
                            const parsed = JSON.parse(userConfig);
                            if (parsed.enabled) {
                                isUserConfig = true;
                            }
                        }
                    } catch (e) {
                        // 忽略错误
                    }
                    
                    // 更新输入框（如果是用户配置，显示用户配置；否则显示默认配置）
                    if (isUserConfig && config) {
                        userIdInput.value = config.userId || '';
                        cookieInput.value = config.cookie || '';
                    } else {
                        // 显示默认配置，但输入框为空，让用户知道可以自定义
                        userIdInput.value = '';
                        cookieInput.value = '';
                    }
                    
                    // 更新提示信息
                    const hintEl = document.getElementById('config-hint');
                    const hintTextEl = document.getElementById('config-hint-text');
                    if (hintEl && hintTextEl) {
                        if (isUserConfig) {
                            hintTextEl.textContent = '当前使用您的自定义配置。清除后将恢复使用默认配置。';
                            hintEl.style.display = 'block';
                        } else {
                            hintTextEl.textContent = '当前使用默认配置，所有访问者共享。您可以保存自定义配置以覆盖默认设置。';
                            hintEl.style.display = 'block';
                        }
                    }
                    
                    updateAccountStatus();
                }
            });
            
            closeSettingsBtn.addEventListener('click', () => {
                settingsPanel.classList.remove('show');
            });
            
            // 保存配置
            saveBtn.addEventListener('click', () => {
                const userId = userIdInput.value.trim();
                const cookie = cookieInput.value.trim();
                
                if (!userId) {
                    showToast('请输入用户ID', 'error');
                    return;
                }
                
                const success = saveAccountConfig({
                    enabled: true,
                    userId: userId,
                    cookie: cookie
                });
                
                if (success) {
                    showToast('账号配置已保存');
                    updateAccountStatus();
                    
                    // 更新提示信息
                    const hintEl = document.getElementById('config-hint');
                    const hintTextEl = document.getElementById('config-hint-text');
                    if (hintEl && hintTextEl) {
                        hintTextEl.textContent = '当前使用您的自定义配置。清除后将恢复使用默认配置。';
                        hintEl.style.display = 'block';
                    }
                } else {
                    showToast('保存失败', 'error');
                }
            });
            
            // 清除配置
            clearBtn.addEventListener('click', () => {
                clearAccountConfig();
                userIdInput.value = '';
                cookieInput.value = '';
                updateAccountStatus();
                
                // 更新提示信息
                const hintEl = document.getElementById('config-hint');
                const hintTextEl = document.getElementById('config-hint-text');
                if (hintEl && hintTextEl) {
                    hintTextEl.textContent = '当前使用默认配置，所有访问者共享。您可以保存自定义配置以覆盖默认设置。';
                    hintEl.style.display = 'block';
                }
                
                showToast('账号配置已清除，已恢复使用默认配置');
            });
            
            // 点击外部关闭面板
            document.addEventListener('click', (e) => {
                if (!settingsPanel.contains(e.target) && !settingsBtn.contains(e.target)) {
                    settingsPanel.classList.remove('show');
                }
            });
            
            // 初始化状态显示
            updateAccountStatus();
        }

        // ==========================================
        // 运行时间和访问次数统计
        // ==========================================
        const STATS_KEY = 'siteStats';
        
        function initSiteStats() {
            // 获取或初始化统计数据
            let stats = getSiteStats();
            
            // 如果是新访问，增加访问次数
            const lastVisit = sessionStorage.getItem('lastVisit');
            if (!lastVisit) {
                stats.visitCount++;
                sessionStorage.setItem('lastVisit', Date.now().toString());
                saveSiteStats(stats);
            }
            
            // 更新显示
            updateVisitCount(stats.visitCount);
            
            // 启动运行时间计时器
            startRunTimeCounter(stats.startTime);
        }
        
        function getSiteStats() {
            try {
                const data = localStorage.getItem(STATS_KEY);
                if (data) {
                    return JSON.parse(data);
                }
            } catch (e) { console.warn('读取统计数据失败:', e); }
            
            // 默认值：首次访问
            const defaultStats = {
                startTime: Date.now(),
                visitCount: 0
            };
            saveSiteStats(defaultStats);
            return defaultStats;
        }
        
        function saveSiteStats(stats) {
            try {
                localStorage.setItem(STATS_KEY, JSON.stringify(stats));
            } catch (e) { console.warn('保存统计数据失败:', e); }
        }
        
        function updateVisitCount(count) {
            if (visitCountEl) {
                visitCountEl.textContent = count.toLocaleString();
            }
        }
        
        function startRunTimeCounter(startTime) {
            function updateRunTime() {
                const now = Date.now();
                const diff = now - startTime;
                
                const days = Math.floor(diff / (1000 * 60 * 60 * 24));
                const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                const seconds = Math.floor((diff % (1000 * 60)) / 1000);
                
                if (runTimeEl) {
                    runTimeEl.textContent = `${days}天${hours}时${minutes}分${seconds}秒`;
                }
            }
            
            // 立即更新一次
            updateRunTime();
            // 每秒更新
            setInterval(updateRunTime, 1000);
        }

        // ==========================================
        // 覆盖页面（关于我、工具导航）
        // ==========================================
        const pageMessages = {
            about: '啥也没写，等我飞升上界，再来寻求造化！',
            tools: '工具箱正在打造中，敬请期待...'
        };
        
        function showOverlayPage(pageType) {
            const page = document.getElementById(`${pageType}-page`);
            const textEl = document.getElementById(`${pageType}-text`);
            if (!page || !textEl) return;
            
            const message = pageMessages[pageType] || '';
            
            // 显示页面
            page.style.display = 'flex';
            setTimeout(() => page.classList.add('show'), 10);
            
            // 清空文字
            textEl.innerHTML = '';
            
            // 逐字淡入动画
            message.split('').forEach((char, index) => {
                const span = document.createElement('span');
                span.textContent = char === ' ' ? '\u00A0' : char;
                span.style.animationDelay = `${index * 0.1}s`;
                textEl.appendChild(span);
            });
        }
        
        function hideOverlayPage(pageType) {
            const page = document.getElementById(`${pageType}-page`);
            const textEl = document.getElementById(`${pageType}-text`);
            if (!page) return;
            page.classList.remove('show');
            setTimeout(() => {
                page.style.display = 'none';
                if (textEl) textEl.innerHTML = '';
            }, 500);
        }
        
        // 导航栏点击事件 - 在 DOMContentLoaded 后绑定
        document.addEventListener('DOMContentLoaded', () => {
            document.querySelectorAll('.nav-item[data-page]').forEach(item => {
                item.addEventListener('click', (e) => {
                    const page = item.dataset.page;
                    if (page === 'about' || page === 'tools') {
                        e.preventDefault();
                        showOverlayPage(page);
                    } else if (page === 'home') {
                        e.preventDefault();
                        hideOverlayPage('about');
                        hideOverlayPage('tools');
                    }
                });
            });
        });

        // 暴露给 HTML onclick
        window.playTrack = playTrack;
        window.hideOverlayPage = hideOverlayPage;
    </script>
