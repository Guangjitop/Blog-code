<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello World | 开发者主页</title>
    <!-- 引入字体图标 -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <!-- 引入编程字体 -->
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;600&family=Noto+Sans+SC:wght@300;400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #050505; /* 更深邃的黑 */
            --text-color: #e6edf3;
            --accent-color: #58a6ff;
            --nav-bg: rgba(22, 27, 34, 0.6);
            --netease-red: #c20c0c;
            --success-green: #3fb950;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Noto Sans SC', sans-serif;
            overflow: hidden;
            height: 100vh;
            position: relative;
        }

        /* --- 1. 背景层设置 --- */
        #canvas-galaxy {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1; /* 银河在最底层 */
        }

        /* 背景代码纹理，降低透明度，作为暗纹存在 */
        #code-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            padding: 20px;
            font-family: 'Fira Code', monospace;
            font-size: 14px;
            line-height: 1.5;
            color: #1f2428; /* 极暗的代码色，不抢戏 */
            z-index: 0;
            opacity: 0.3;
            overflow: hidden;
            white-space: pre-wrap;
            pointer-events: none;
        }

        #canvas-particles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 20; /* 鼠标特效层级较高 */
            pointer-events: none;
        }

        /* --- UI 界面 --- */
        header {
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 100;
            display: flex;
            justify-content: center;
            padding: 25px;
        }

        nav {
            background: var(--nav-bg);
            backdrop-filter: blur(5px);
            border-radius: 50px;
            padding: 10px 35px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: 0.3s;
        }

        nav:hover {
            border-color: var(--accent-color);
            box-shadow: 0 0 15px rgba(88, 166, 255, 0.2);
        }

        nav ul {
            display: flex;
            list-style: none;
            gap: 40px;
        }

        nav a {
            color: var(--text-color);
            text-decoration: none;
            font-weight: 500;
            font-size: 16px;
            position: relative;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        nav a:hover, nav a.active {
            color: var(--accent-color);
        }

        /* --- 主内容区 (取消了卡片边框，全屏居中) --- */
        main {
            position: relative;
            z-index: 10;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            /* 给文字加一点阴影，保证在星星划过时依然清晰 */
            text-shadow: 0 5px 15px rgba(0,0,0,0.8);
            pointer-events: none; /* 让鼠标穿透文字区域，不影响交互 */
        }
        
        main * {
            pointer-events: auto; /* 恢复内部元素的点击 */
        }

        .avatar-glow {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            padding: 4px;
            background: linear-gradient(135deg, #58a6ff, #bc8cff);
            margin-bottom: 25px;
            animation: pulse 3s infinite;
        }
        
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(88, 166, 255, 0.4); }
            70% { box-shadow: 0 0 0 20px rgba(88, 166, 255, 0); }
            100% { box-shadow: 0 0 0 0 rgba(88, 166, 255, 0); }
        }

        .avatar-glow img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            background: #000;
            border: 4px solid var(--bg-color);
        }

        .role-badge {
            display: inline-block;
            background: rgba(88, 166, 255, 0.1);
            color: #79c0ff;
            padding: 6px 16px;
            border-radius: 20px;
            font-family: 'Fira Code', monospace;
            font-size: 0.95rem;
            margin-bottom: 20px;
            border: 1px solid rgba(88, 166, 255, 0.2);
            backdrop-filter: blur(4px);
        }

        h1 {
            font-size: 4rem;
            margin-bottom: 15px;
            font-weight: 700;
            letter-spacing: -1px;
            background: linear-gradient(120deg, #fff, #c9d1d9, #58a6ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .quote-container {
            font-size: 1.4rem;
            color: #8b949e;
            height: 40px;
            font-weight: 300;
            font-family: 'Fira Code', monospace;
        }

        .cursor {
            display: inline-block;
            width: 10px;
            height: 3px;
            background-color: var(--accent-color);
            animation: blink 1s step-end infinite;
            vertical-align: middle;
            margin-left: 5px;
        }

        @keyframes blink { 50% { opacity: 0; } }

        /* --- 音乐播放器 --- */
        .music-player {
            position: fixed;
            bottom: 40px;
            right: 40px;
            z-index: 100;
            background: rgba(13, 17, 23, 0.85);
            border: 1px solid rgba(255,255,255,0.08);
            padding: 12px 20px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            gap: 12px;
            backdrop-filter: blur(15px);
            transition: 0.3s;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        
        .music-player:hover {
            background: rgba(13, 17, 23, 0.95);
            border-color: var(--accent-color);
        }

        .disk {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            border-radius: 50%;
            animation: rotate 6s linear infinite;
            animation-play-state: paused;
            border: 2px solid #21262d;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        
        .disk::after {
            content: '';
            width: 10px;
            height: 10px;
            background: #58a6ff;
            border-radius: 50%;
        }

        .disk.playing { animation-play-state: running; }
        
        .disk.netease::after {
            background: var(--netease-red);
        }
        
        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .control-btn {
            background: none;
            border: none;
            color: #8b949e;
            font-size: 1rem;
            cursor: pointer;
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
            flex-shrink: 0;
        }
        
        .control-btn:hover { 
            color: var(--accent-color); 
            transform: scale(1.15); 
        }
        
        .control-btn.play-btn {
            font-size: 1.3rem;
            color: #fff;
        }
        
        .music-info {
            font-size: 0.8rem;
            color: #8b949e;
            max-width: 180px;
            overflow: hidden;
        }
        
        .music-info .track-title {
            color: #e6edf3;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 2px;
        }
        
        .music-info .track-artist {
            font-size: 0.7rem;
            color: #6e7681;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .music-info .track-source {
            font-size: 0.6rem;
            display: inline-block;
            padding: 1px 5px;
            border-radius: 3px;
            margin-top: 3px;
        }
        
        .music-info .track-source.local {
            background: rgba(63, 185, 80, 0.2);
            color: var(--success-green);
        }
        
        .music-info .track-source.netease {
            background: rgba(194, 12, 12, 0.2);
            color: var(--netease-red);
        }
        
        /* 歌词显示区域 */
        .lyrics-container {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 50;
            text-align: center;
            pointer-events: none;
            max-width: 90%;
            padding: 0 20px;
        }
        
        .lyrics-line {
            font-size: 1.1rem;
            color: rgba(230, 237, 243, 0.5);
            margin: 10px 0;
            opacity: 0;
            transform: translateY(15px);
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            text-shadow: 0 2px 15px rgba(0,0,0,0.9);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 100%;
        }
        
        .lyrics-line.active {
            opacity: 1;
            transform: translateY(0);
            color: var(--accent-color);
            font-size: 1.5rem;
            font-weight: 600;
            text-shadow: 0 0 25px rgba(88, 166, 255, 0.8), 0 2px 10px rgba(0,0,0,0.9);
        }
        
        .lyrics-line.prev {
            opacity: 0.35;
            transform: translateY(-8px);
            font-size: 0.95rem;
        }
        
        .lyrics-line.next {
            opacity: 0.35;
            transform: translateY(8px);
            font-size: 0.95rem;
        }
        
        .lyrics-empty {
            font-size: 0.9rem;
            color: rgba(139, 148, 158, 0.4);
            font-style: italic;
            padding: 20px 0;
        }
        
        /* 响应式调整 */
        @media (max-width: 768px) {
            .lyrics-container {
                bottom: 120px;
                max-width: 95%;
            }
            
            .lyrics-line {
                font-size: 1rem;
                margin: 8px 0;
            }
            
            .lyrics-line.active {
                font-size: 1.3rem;
            }
        }
        
        /* 播放列表面板 */
        .playlist-panel {
            position: fixed;
            bottom: 100px;
            right: 40px;
            width: 380px;
            max-height: 500px;
            background: rgba(13, 17, 23, 0.95);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            backdrop-filter: blur(20px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.6);
            z-index: 99;
            overflow: hidden;
            transform: translateY(20px);
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }
        
        .playlist-panel.show {
            transform: translateY(0);
            opacity: 1;
            visibility: visible;
        }
        
        .playlist-header {
            padding: 15px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }
        
        .playlist-header h3 {
            font-size: 0.95rem;
            font-weight: 600;
            color: #e6edf3;
            margin: 0 0 12px 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .playlist-header h3 span {
            font-size: 0.75rem;
            color: #6e7681;
            font-weight: normal;
        }
        
        /* Tab 切换 */
        .playlist-tabs {
            display: flex;
            gap: 8px;
        }
        
        .playlist-tab {
            flex: 1;
            padding: 8px 12px;
            border: none;
            background: rgba(255,255,255,0.05);
            color: #8b949e;
            font-size: 0.8rem;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        
        .playlist-tab:hover {
            background: rgba(255,255,255,0.1);
        }
        
        .playlist-tab.active {
            background: var(--accent-color);
            color: #fff;
        }
        
        .playlist-tab.active.netease {
            background: var(--netease-red);
        }
        
        /* 搜索框 */
        .search-box {
            padding: 12px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            display: none;
        }
        
        .search-box.show {
            display: block;
        }
        
        .search-input-wrapper {
            display: flex;
            gap: 8px;
        }
        
        .search-input {
            flex: 1;
            padding: 10px 14px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.05);
            color: #e6edf3;
            font-size: 0.85rem;
            border-radius: 8px;
            outline: none;
            transition: 0.2s;
        }
        
        .search-input:focus {
            border-color: var(--accent-color);
            background: rgba(255,255,255,0.08);
        }
        
        .search-input::placeholder {
            color: #6e7681;
        }
        
        .search-btn {
            padding: 10px 16px;
            border: none;
            background: var(--netease-red);
            color: #fff;
            font-size: 0.85rem;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
        }
        
        .search-btn:hover {
            background: #e01414;
            transform: scale(1.02);
        }
        
        .search-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        /* 热门推荐 */
        .hot-tags {
            padding: 8px 0;
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }
        
        .hot-tag {
            padding: 4px 10px;
            background: rgba(194, 12, 12, 0.15);
            color: #ff7b72;
            font-size: 0.7rem;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.2s;
            border: none;
        }
        
        .hot-tag:hover {
            background: rgba(194, 12, 12, 0.3);
        }
        
        .playlist-items {
            max-height: 320px;
            overflow-y: auto;
            padding: 8px 0;
        }
        
        .playlist-items::-webkit-scrollbar {
            width: 4px;
        }
        
        .playlist-items::-webkit-scrollbar-track {
            background: transparent;
        }
        
        .playlist-items::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
        }
        
        .playlist-item {
            padding: 10px 20px;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .playlist-item:hover {
            background: rgba(88, 166, 255, 0.1);
        }
        
        .playlist-item.active {
            background: rgba(88, 166, 255, 0.15);
        }
        
        .playlist-item.active .item-title {
            color: var(--accent-color);
        }
        
        .playlist-item .item-index {
            width: 20px;
            font-size: 0.75rem;
            color: #6e7681;
            text-align: center;
        }
        
        .playlist-item.active .item-index {
            color: var(--accent-color);
        }
        
        .playlist-item .item-info {
            flex: 1;
            overflow: hidden;
        }
        
        .playlist-item .item-title {
            font-size: 0.85rem;
            color: #e6edf3;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .playlist-item .item-artist {
            font-size: 0.7rem;
            color: #6e7681;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .playlist-item .item-format {
            font-size: 0.65rem;
            color: #58a6ff;
            background: rgba(88, 166, 255, 0.1);
            padding: 2px 6px;
            border-radius: 4px;
            text-transform: uppercase;
        }
        
        .playlist-item .item-format.netease {
            color: var(--netease-red);
            background: rgba(194, 12, 12, 0.1);
        }
        
        .playlist-empty {
            padding: 40px 20px;
            text-align: center;
            color: #6e7681;
            font-size: 0.85rem;
        }
        
        .playlist-empty i {
            font-size: 2rem;
            margin-bottom: 10px;
            display: block;
        }
        
        /* 加载动画 */
        .loading-spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.2);
            border-top-color: var(--accent-color);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* Toast 提示 */
        .toast {
            position: fixed;
            top: 100px;
            left: 50%;
            transform: translateX(-50%) translateY(-20px);
            background: rgba(13, 17, 23, 0.95);
            color: #e6edf3;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 0.85rem;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: 0.3s;
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
        }
        
        .toast.show {
            opacity: 1;
            visibility: visible;
            transform: translateX(-50%) translateY(0);
        }
        
        .toast.error {
            border-color: rgba(248, 81, 73, 0.5);
            color: #ff7b72;
        }
        
        .toast.success {
            border-color: rgba(63, 185, 80, 0.5);
            color: var(--success-green);
        }

    </style>
</head>
<body>

    <!-- Toast 提示 -->
    <div class="toast" id="toast"></div>

    <!-- 1. 背景代码 (暗纹) -->
    <div id="code-bg"></div>

    <!-- 2. 全屏银河 (核心视觉) -->
    <canvas id="canvas-galaxy"></canvas>

    <!-- 3. 鼠标代码拖尾 (交互特效) -->
    <canvas id="canvas-particles"></canvas>

    <header>
        <nav>
            <ul>
                <li><a href="#" class="active"><i class="fas fa-terminal"></i> 首页</a></li>
                <li><a href="/app/" id="app-link"><i class="fas fa-cloud"></i> 托管商城</a></li>
                <li><a href="#"><i class="fas fa-toolbox"></i> 工具导航</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <div class="avatar-glow">
            <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Developer&backgroundColor=b6e3f4" alt="Avatar">
        </div>
        <div class="role-badge">System.out.println("Hello World");</div>
        <h1>EXPLORE UNKNOWN</h1>
        <div class="quote-container">
            <span id="quote-text"></span><span class="cursor"></span>
        </div>
    </main>

    <!-- 播放列表面板 -->
    <div class="playlist-panel" id="playlist-panel">
        <div class="playlist-header">
            <h3>
                <span><i class="fas fa-music"></i> 音乐播放器</span>
                <span id="playlist-count">0 首歌曲</span>
            </h3>
            <div class="playlist-tabs">
                <button class="playlist-tab active" data-tab="local">
                    <i class="fas fa-folder"></i> 本地音乐
                </button>
                <button class="playlist-tab netease" data-tab="online">
                    <i class="fas fa-cloud"></i> 网易云
                </button>
            </div>
        </div>
        
        <!-- 搜索框 (仅在线模式显示) -->
        <div class="search-box" id="search-box">
            <div class="search-input-wrapper">
                <input type="text" class="search-input" id="search-input" placeholder="搜索歌曲、歌手...">
                <button class="search-btn" id="search-btn">
                    <i class="fas fa-search"></i>
                </button>
            </div>
            <div class="hot-tags" id="hot-tags">
                <button class="hot-tag" data-keyword="周杰伦">周杰伦</button>
                <button class="hot-tag" data-keyword="林俊杰">林俊杰</button>
                <button class="hot-tag" data-keyword="邓紫棋">邓紫棋</button>
                <button class="hot-tag" data-keyword="华晨宇">华晨宇</button>
                <button class="hot-tag" data-keyword="薛之谦">薛之谦</button>
                <button class="hot-tag" data-keyword="陈奕迅">陈奕迅</button>
            </div>
        </div>
        
        <div class="playlist-items" id="playlist-items">
            <div class="playlist-empty">
                <i class="fas fa-music"></i>
                暂无音乐
            </div>
        </div>
    </div>

    <!-- 歌词显示区域 -->
    <div class="lyrics-container" id="lyrics-container">
        <div class="lyrics-empty">暂无歌词</div>
    </div>

    <!-- 音乐播放器 -->
    <div class="music-player">
        <div class="disk" id="disk"></div>
        <div class="music-info" id="music-info">
            <div class="track-title">暂无音乐</div>
            <div class="track-artist">--</div>
            <div class="track-source" style="display: none;"></div>
        </div>
        <button class="control-btn" id="prev-btn" title="上一曲">
            <i class="fas fa-step-backward"></i>
        </button>
        <button class="control-btn play-btn" id="play-btn" title="播放/暂停">
            <i class="fas fa-play"></i>
        </button>
        <button class="control-btn" id="next-btn" title="下一曲">
            <i class="fas fa-step-forward"></i>
        </button>
        <button class="control-btn" id="playlist-btn" title="播放列表">
            <i class="fas fa-list"></i>
        </button>
        <audio id="audio-source"></audio>
    </div>

    <script>
        /**
         * 模块0：应用配置
         * 支持动态域名配置，部署时可通过配置文件或环境变量设置
         */
        const AppConfig = {
            // 默认配置，可通过 window.APP_CONFIG 覆盖
            domain: window.APP_CONFIG?.domain || window.location.hostname,
            port: window.APP_CONFIG?.port || '8999', // 开发环境默认前端端口

        const galaxyCanvas = document.getElementById('canvas-galaxy');

        // 增加星星数量以覆盖更大的区域
        const starCount = 1500; 
        const stars = [];
        
        function initGalaxy() {
            gWidth = galaxyCanvas.width = window.innerWidth;
            gHeight = galaxyCanvas.height = window.innerHeight;
            stars.length = 0;
            
            // 计算屏幕对角线长度，确保覆盖角落
            const maxDist = Math.sqrt(gWidth*gWidth + gHeight*gHeight) / 1.5;

            for (let i = 0; i < starCount; i++) {
                stars.push({
                    // 核心修改：让星星分布更广，不再局限于min(w,h)
                    radius: Math.random() * maxDist, 
                    angle: Math.random() * Math.PI * 2,
                    speed: (Math.random() * 0.0003) + 0.0001, // 外圈转得慢，内圈转得快可以在update里算
                    size: Math.random() * 1.5 + 0.5,
                    // 随机颜色：青、蓝、紫、白
                    color: i % 10 === 0 ? '#ff7b72' : (i % 5 === 0 ? '#d2a8ff' : (i % 2 === 0 ? '#58a6ff' : '#ffffff'))
                });
            }
        }

        function animateGalaxy() {
            gCtx.clearRect(0, 0, gWidth, gHeight);
            
            const centerX = gWidth / 2;
            const centerY = gHeight / 2;

            for (const star of stars) {
                // 模拟物理：越靠近中心转得越快 (可选优化，这里保持匀速更优雅)
                star.angle += star.speed;

                // 3D 投影逻辑：X轴不变，Y轴压缩
                const x = centerX + Math.cos(star.angle) * star.radius;
                const y = centerY + Math.sin(star.angle) * star.radius * 0.5; // 0.5压扁系数

                // 简单的视差闪烁
                const alpha = 0.3 + Math.abs(Math.cos(star.angle * 3)) * 0.7;

                gCtx.beginPath();
                gCtx.arc(x, y, star.size, 0, Math.PI * 2);
                gCtx.fillStyle = star.color;
                gCtx.globalAlpha = alpha;
                gCtx.fill();
            }
            requestAnimationFrame(animateGalaxy);
        }

        class CodeParticle {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                // 随机选择一个符号
                this.text = codeSymbols[Math.floor(Math.random() * codeSymbols.length)];
                this.size = Math.random() * 12 + 10; // 字体大小
                this.speedX = Math.random() * 2 - 1;
                this.speedY = Math.random() * 2 - 1;
                // 颜色：亮青色到紫色
                this.color = `hsl(${Math.random() * 60 + 170}, 100%, 70%)`;
                this.life = 1.0;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                this.life -= 0.02; // 消失速度
            }
            draw() {
                pCtx.fillStyle = this.color;
                pCtx.globalAlpha = this.life;
                pCtx.font = `bold ${this.size}px 'Fira Code'`; // 动态大小
                // 绘制文字而非圆形
                pCtx.fillText(this.text, this.x, this.y);

        }

                }
            }

        }

                m4a: 'audio/mp4',
                webm: 'audio/webm'
            };
            
            const support = {};
            for (const [ext, mime] of Object.entries(formats)) {
                const canPlay = audio.canPlayType(mime);
                support[ext] = canPlay === 'probably' || canPlay === 'maybe';
            }
            return support;

        // ========== LRC歌词解析 ==========
        function parseLRC(lrcText) {
            if (!lrcText || !lrcText.trim()) return [];
            
            const lines = lrcText.split('\n');
            const lyrics = [];
            
            // 匹配时间标签的正则: [mm:ss.xx] 或 [mm:ss]
            const timeRegex = /\[(\d{2}):(\d{2})(?:\.(\d{2,3}))?\]/g;
            
            for (const line of lines) {
                const matches = [...line.matchAll(timeRegex)];
                const text = line.replace(timeRegex, '').trim();
                
                if (!text) continue;
                
                // 一个歌词行可能有多个时间标签
                for (const match of matches) {
                    const minutes = parseInt(match[1]);
                    const seconds = parseInt(match[2]);
                    const milliseconds = match[3] ? parseInt(match[3].padEnd(3, '0')) : 0;
                    const time = minutes * 60 + seconds + milliseconds / 1000;
                    
                    lyrics.push({ time, text });
                }
            }
            
            // 按时间排序
            lyrics.sort((a, b) => a.time - b.time);
            return lyrics;
        }

                }
                return;
            }
            
            // 找到当前应该显示的歌词索引
            let currentIndex = -1;
            for (let i = 0; i < playerState.lyrics.length; i++) {
                if (playerState.lyrics[i].time <= currentTime) {
                    currentIndex = i;

                    break;

            // 如果索引没变化，不更新（避免频繁DOM操作）
            if (currentIndex === playerState.currentLyricIndex && currentIndex >= 0) return;
            playerState.currentLyricIndex = currentIndex;
            
            // 显示当前歌词及前后各一句
            const displayLines = [];
            
            for (let i = -1; i <= 1; i++) {
                const index = currentIndex + i;
                if (index >= 0 && index < playerState.lyrics.length) {
                    displayLines.push({
                        text: playerState.lyrics[index].text,
                        isActive: i === 0,

        async function searchSongs(keyword) {
            if (!keyword.trim()) {
                showToast('请输入搜索关键词', 'error');
                return;
            }
            
            playerState.isLoading = true;
            searchBtn.disabled = true;
            searchBtn.innerHTML = '<span class="loading-spinner"></span>';
            
            try {
                const results = await MusicAPI.search(keyword);
                if (results.length === 0) {
                    showToast('未找到相关歌曲', 'error');
                    return;
                }
                
                playerState.onlinePlaylist = results;
                playerState.currentIndex = 0;
                renderPlaylist();
                showToast(`找到 ${results.length} 首歌曲`, 'success');
            } catch (e) {
                showToast('搜索失败，请稍后重试', 'error');
            } finally {
                playerState.isLoading = false;
                searchBtn.disabled = false;
                searchBtn.innerHTML = '<i class="fas fa-search"></i>';
            }
        }
        
        // ========== 加载热门歌曲 ==========
        async function loadHotSongs() {
            playerState.isLoading = true;
            playlistItems.innerHTML = `
                <div class="playlist-empty">
                    <span class="loading-spinner"></span><br>
                    正在加载热门歌曲...
                </div>`;
            
            try {
                const results = await MusicAPI.getHot();
                playerState.onlinePlaylist = results;
                renderPlaylist();
            } catch (e) {
                playlistItems.innerHTML = `
                    <div class="playlist-empty">
                        <i class="fas fa-exclamation-circle"></i>
                        加载失败<br>
                        <small>请尝试搜索歌曲</small>
                    </div>`;
            } finally {
                playerState.isLoading = false;
            }
        }
        
        // ========== 加载本地播放列表 ==========
        async function loadLocalPlaylist() {
            try {
                const response = await fetch('playlist.json');
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const data = await response.json();
                playerState.localPlaylist = (data.tracks || []).map(track => ({
                    ...track,
                    source: 'local'
                }));
            } catch (e) {
                console.warn('加载本地播放列表失败:', e);
                playerState.localPlaylist = [];
            }
            
            // 恢复状态
            const saved = restorePlayerState();
            if (saved) {
                playerState.mode = saved.mode || 'local';
                playerState.currentIndex = Math.min(
                    saved.currentIndex || 0, 
                    Math.max(0, getCurrentPlaylist().length - 1)
                );
                playerState.volume = saved.volume !== undefined ? saved.volume : 0.3;
            }
            
            audio.volume = playerState.volume;
            
            // 初始化Tab状态
            switchMode(playerState.mode);
            
            // 预加载当前曲目
            const playlist = getCurrentPlaylist();
            if (playlist.length > 0) {
                const track = playlist[playerState.currentIndex];
                audio.src = track.source === 'netease' ? track.url : track.path;
            }
        }
        
        // ========== 事件绑定 ==========
        
        // 播放/暂停
        playBtn.addEventListener('click', () => {
            const playlist = getCurrentPlaylist();
            if (playlist.length === 0) {
                showToast('播放列表为空', 'error');
                return;
            }
            
            if (playerState.isPlaying) {
                audio.pause();
                playerState.isPlaying = false;
            } else {
                audio.play().then(() => {
                    playerState.isPlaying = true;
                }).catch(e => {
                    console.error('播放失败:', e);
                    showToast('播放失败', 'error');
                });
            }
            updatePlayState();
        });
        
        // 上一曲/下一曲
        prevBtn.addEventListener('click', playPrev);
        nextBtn.addEventListener('click', playNext);
        
        // 播放列表面板
        playlistBtn.addEventListener('click', () => {
            playlistPanel.classList.toggle('show');
        });
        
        // 点击外部关闭
        document.addEventListener('click', (e) => {
            if (!playlistPanel.contains(e.target) && !playlistBtn.contains(e.target)) {
                playlistPanel.classList.remove('show');
            }
        });
        
        // Tab切换
        playlistTabs.forEach(tab => {
            tab.addEventListener('click', () => {
                const mode = tab.dataset.tab === 'local' ? 'local' : 'online';
                switchMode(mode);
            });
        });
        
        // 搜索
        searchBtn.addEventListener('click', () => {
            searchSongs(searchInput.value);
        });
        
        searchInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                searchSongs(searchInput.value);
            }
        });
        
        // 热门标签
        hotTags.querySelectorAll('.hot-tag').forEach(tag => {
            tag.addEventListener('click', () => {
                const keyword = tag.dataset.keyword;
                searchInput.value = keyword;
                searchSongs(keyword);
            });
        });
        
        // 播放结束自动下一曲
        audio.addEventListener('ended', playNext);
        
        // 音频时间更新 - 同步歌词
        audio.addEventListener('timeupdate', () => {
            if (playerState.lyrics.length > 0) {
                updateLyricsDisplay(audio.currentTime);
            }
        });
        
        // 音频错误处理
        audio.addEventListener('error', () => {
            const playlist = getCurrentPlaylist();
            const track = playlist[playerState.currentIndex];
            
            if (track && track.source !== 'netease' && track.format) {
                const ext = track.format.toLowerCase();
                if (!audioSupport[ext]) {
                    showToast(`不支持 ${ext.toUpperCase()} 格式`, 'error');
                } else {
                    showToast('音频加载失败', 'error');
                }
            } else {
                showToast('音频加载失败', 'error');
            }
            
            setTimeout(playNext, 1500);
        });
        
        // 初始化
        loadLocalPlaylist();
    </script>
</body>
</html>
