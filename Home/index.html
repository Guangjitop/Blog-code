<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>blog.mytype.top - Code Universe</title>
    <!-- 引入 THREE.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <!-- Font Awesome -->
    <link rel="icon" type="image/svg+xml" href="favicon.svg?v=2">
    <link rel="alternate icon" href="favicon.ico?v=2">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/music-player.css?v=1">
    <!-- 配置 API 基础路径 -->
    <script>
        // 根据当前环境配置API基础路径
        // 如果通过nginx访问（生产环境），使用相对路径
        // 如果直接访问HTML（开发环境），使用完整的backend URL
        if (window.location.port === '8080' || window.location.protocol === 'file:') {
            // 开发环境：直接访问backend
            window.STATS_API_BASE = 'http://localhost:8999';
        } else {
            // 生产环境：通过nginx代理
            window.STATS_API_BASE = '';
        }
    </script>
    <!-- 网站统计 API -->
    <script src="js/stats-api.js?v=2"></script>
    <style>
        :root {
            --bg-color: #050505;
            --text-color: #e6edf3;
            --accent-color: #58a6ff;
            /* 原主色调 */
            --secondary-color: #bc13fe;
            /* 新增辅色调 */
            --nav-bg: rgba(22, 27, 34, 0.6);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Consolas', 'Fira Code', 'Noto Sans SC', sans-serif;
            overflow: hidden;
            height: 100vh;
            position: relative;
        }

        /* --- 1. 背景层设置 --- */
        #canvas-galaxy {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            /* 银河在最底层 */
        }

        /* 背景代码纹理 (JS动态打字) */
        #code-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            padding: 20px;
            font-family: 'Consolas', 'Fira Code', monospace;
            font-size: 14px;
            line-height: 1.5;
            color: rgba(88, 166, 255, 0.15);
            /* 极暗的蓝色代码 */
            z-index: 0;
            overflow: hidden;
            white-space: pre-wrap;
            pointer-events: none;
        }

        /* --- 2. 新版导航栏 (替换原有) --- */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            display: flex;
            justify-content: center;
            padding: 20px 0;
            z-index: 100;
            background: linear-gradient(to bottom, rgba(0, 0, 0, 0.9), transparent);
        }

        .nav-links {
            display: flex;
            gap: 40px;
            backdrop-filter: blur(5px);
            padding: 10px 40px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.03);
        }

        .nav-item {
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.3s;
            position: relative;
            cursor: pointer;
            font-family: 'Consolas', sans-serif;
        }

        .nav-item:hover,
        .nav-item.active {
            color: var(--accent-color);
            text-shadow: 0 0 8px var(--accent-color);
        }

        /* --- 3. 鼠标代码拖尾特效样式 --- */
        .code-particle {
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            font-family: 'Fira Code', monospace;
            font-weight: bold;
            font-size: 14px;
            user-select: none;
            white-space: nowrap;
            animation: floatUp 1s ease-out forwards;
        }

        @keyframes floatUp {
            0% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }

            100% {
                opacity: 0;
                transform: translateY(-50px) scale(0.5);
            }
        }

        /* --- 4. 主内容区 --- */
        main {
            position: relative;
            z-index: 10;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            pointer-events: none;
        }

        main * {
            pointer-events: auto;
        }

        #earth-container {
            width: 300px;
            height: 300px;
            margin-bottom: 25px;
            position: relative;
            pointer-events: auto;
        }

        #earth-container canvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 2;
            border-radius: 50%;
            display: block;
        }



        h1 {
            font-size: 4rem;
            margin-bottom: 15px;
            font-weight: 700;
            letter-spacing: -1px;
            background: linear-gradient(120deg, #fff, #c9d1d9, #58a6ff);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 5px 15px rgba(0, 0, 0, 0.8);
        }

        .role-badge {
            display: inline-block;
            background: rgba(88, 166, 255, 0.1);
            color: #79c0ff;
            padding: 6px 16px;
            border-radius: 20px;
            font-family: 'Fira Code', monospace;
            font-size: 0.95rem;
            margin-bottom: 20px;
            border: 1px solid rgba(88, 166, 255, 0.2);
            backdrop-filter: blur(4px);
        }

        .quote-container {
            font-size: 1.4rem;
            color: #8b949e;
            height: 40px;
            font-weight: 300;
            font-family: 'Fira Code', monospace;
            text-shadow: 0 5px 15px rgba(0, 0, 0, 0.8);
            position: relative;
        }

        #typewriter::after {
            content: '|';
            display: inline-block;
            animation: blink 0.7s step-end infinite;
            color: var(--accent-color);
            margin-left: 4px;
        }

        @keyframes blink {
            50% {
                opacity: 0;
            }
        }



        /* 运行统计 - 左上角 */
        #site-stats {
            position: fixed;
            top: 80px;
            left: 20px;
            font-family: 'Fira Code', monospace;
            font-size: 0.8em;
            color: rgba(255, 255, 255, 0.6);
            z-index: 100;
            line-height: 1.8;
        }

        #site-stats .stat-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        #site-stats .stat-icon {
            color: var(--accent-color);
            width: 16px;
        }

        #site-stats .stat-value {
            color: var(--accent-color);
        }

        #toast {
            position: fixed;
            bottom: -50px;
            left: 50%;
            transform: translateX(-50%);
            padding: 12px 24px;
            background: var(--nav-bg);
            backdrop-filter: blur(10px);
            color: var(--text-color);
            border: 1px solid rgba(88, 166, 255, 0.3);
            border-radius: 12px;
            font-size: 0.9rem;
            z-index: 1000;
            transition: all 0.5s ease;
            white-space: nowrap;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.5);
            font-family: 'Fira Code', 'Noto Sans SC', monospace;
        }

        #toast.show {
            bottom: 30px;
        }



        @media (max-width: 768px) {
            .nav-links {
                padding: 8px 15px;
                gap: 20px;
            }

            .nav-item {
                font-size: 0.9rem;
                letter-spacing: 1px;
            }

            #earth-container {
                width: 250px;
                height: 250px;
            }

            h1 {
                font-size: 3rem;
            }
        }

        /* 关于我页面 - 半透明背景显示星空 */
        #about-page {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 150;
            display: none;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.5s ease;
        }
        

        #about-page.show {
            display: flex;
            opacity: 1;
        }

        #about-page .about-text {
            font-family: 'Fira Code', 'Noto Sans SC', monospace;
            font-size: 1.5em;
            color: var(--text-color);
            text-align: center;
            overflow: hidden;
            white-space: nowrap;
        }

        #about-page .about-text span {
            display: inline-block;
            opacity: 0;
            animation: fadeInChar 0.5s ease forwards;
        }

        @keyframes fadeInChar {
            0% {
                opacity: 0;
                transform: translateX(-20px);
            }
            100% {
                opacity: 1;
                transform: translateX(0);
            }
        }

        #about-page .back-btn {
            position: absolute;
            top: 30px;
            left: 30px;
            background: none;
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: var(--text-color);
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-family: 'Fira Code', monospace;
            transition: all 0.3s;
        }

        #about-page .back-btn:hover,
        #tools-page .back-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--accent-color);
            color: var(--accent-color);
        }

        /* 工具导航页面 - 复用关于我页面样式 */
        #tools-page {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(5, 5, 5, 0.85);
            z-index: 150;
            display: none;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        #tools-page.show {
            display: flex;
            opacity: 1;
        }

        #tools-page .about-text {
            font-family: 'Fira Code', 'Noto Sans SC', monospace;
            font-size: 1.5em;
            color: var(--text-color);
            text-align: center;
            overflow: hidden;
            white-space: nowrap;
        }

        #tools-page .about-text span {
            display: inline-block;
            opacity: 0;
            animation: fadeInChar 0.5s ease forwards;
        }

        #tools-page .back-btn {
            position: absolute;
            top: 30px;
            left: 30px;
            background: none;
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: var(--text-color);
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-family: 'Fira Code', monospace;
            transition: all 0.3s;
        }
    </style>
</head>

<body>

    <!-- 1. 背景层 -->
    <div id="canvas-galaxy"></div>
    <!-- 代码打字背景容器 -->
    <div id="code-bg"></div>

    <!-- 关于我页面 -->
    <div id="about-page">
        <button class="back-btn" onclick="hideOverlayPage('about')"><i class="fas fa-arrow-left"></i> 返回</button>
        <div class="about-text" id="about-text"></div>
    </div>

    <!-- 工具导航页面 -->
    <div id="tools-page">
        <button class="back-btn" onclick="hideOverlayPage('tools')"><i class="fas fa-arrow-left"></i> 返回</button>
        <div class="about-text" id="tools-text"></div>
    </div>

    <!-- 2. UI 层 - 替换为新版导航栏 -->
    <nav>
        <div class="nav-links">
            <a href="#" class="nav-item active" data-page="home">首页</a>
            <a href="/app/manage/" class="nav-item">托管商城</a>
            <a href="#" class="nav-item" data-page="tools">工具导航</a>
            <a href="#" class="nav-item" data-page="about">关于我</a>
        </div>
    </nav>

    <!-- 3. 主内容 (地球在中间) -->
    <main>
        <div id="earth-container">
        </div>

        <h1>Hello, World! I'm Zard</h1>
        <p class="role-badge">Front-End Developer | Code Explorer</p>
        <div class="quote-container">
            <span id="typewriter">// Coding The Future...</span> <!-- 标语轮播 -->
        </div>
    </main>


    <!-- 运行统计 - 左上角 -->
    <div id="site-stats">
        <div class="stat-item">
            <i class="fas fa-clock stat-icon"></i>
            <span>运行时间: <span id="run-time" class="stat-value">0天0时0分0秒</span></span>
        </div>
        <div class="stat-item">
            <i class="fas fa-eye stat-icon"></i>
            <span>访问次数: <span id="visit-count" class="stat-value">0</span></span>
        </div>
    </div>


    <!-- Toast 提示 -->
    <div id="toast"></div>

    <!-- TuneHub 音乐播放器 -->
    <script src="js/music-player.js?v=1"></script>

    <!-- JavaScript Bundle -->
    <script>
        // ==========================================
        // 1. 新增：Java 代码背景打字动画 (集成特效)
        // ==========================================
        const javaCodeSnippet = `
public class DeveloperLife {
    public static void main(String[] args) {
        World world = new World("Earth");
        while (alive) {
            try {
                code();
                coffee.drink();
                bugs.fix();
                sleep(4 * 60 * 60); // Optimistic
            } catch (Exception e) {
                stackTrace.printStackTrace();
                // Keep moving forward
                continue;
            }
        }
    }
    // "Hello World" is just the beginning.
    // Exploring the universe of logic.
}
`;
        let codeIndex = 0;
        const codeBg = document.getElementById('code-bg');

        function typeCodeBg() {
            if (codeIndex < javaCodeSnippet.length) {
                // 使用 textContent 或 innerHTML 追加
                codeBg.innerHTML += javaCodeSnippet.charAt(codeIndex);
                codeIndex++;
                setTimeout(typeCodeBg, 50); // 打字速度
            } else {
                // 循环播放: 停顿后清空重来
                setTimeout(() => {
                    codeBg.innerHTML = '';
                    codeIndex = 0;
                    typeCodeBg();
                }, 8000);
            }
        }
        // 启动背景打字
        document.addEventListener('DOMContentLoaded', typeCodeBg);

        // ==========================================
        // 2. 新增：鼠标拖尾特效 (随机代码字符)
        // ==========================================
        const codeChars = ['{', '}', '</>', ';', '0', '1', 'var', 'let', 'fn', '#', '&&'];
        const colors = ['#58a6ff', '#bc13fe', '#ffffff', '#3fb950'];

        document.addEventListener('mousemove', (e) => {
            // 限制生成频率，简单的节流
            if (Math.random() > 0.3) return;

            const particle = document.createElement('div');
            particle.className = 'code-particle';
            particle.innerText = codeChars[Math.floor(Math.random() * codeChars.length)];

            // 随机颜色
            particle.style.color = colors[Math.floor(Math.random() * colors.length)];

            // 定位
            particle.style.left = (e.clientX + 10) + 'px';
            particle.style.top = (e.clientY + 10) + 'px';

            // 随机大小微调
            const size = 12 + Math.random() * 8;
            particle.style.fontSize = size + 'px';

            document.body.appendChild(particle);

            // 动画结束后移除
            setTimeout(() => {
                particle.remove();
            }, 1000);
        });

        // ==========================================
        // 3. 原有逻辑：标语轮播 (Typewriter)
        // ==========================================
        const quotes = [
            "Talk is cheap, Show me the code.",
            "0 和 1 构成了我的世界。",
            "保持好奇，保持热爱。",
            "喜欢的事自然可以坚持，不喜欢怎么也长久不了。",
            "Education is not the filling of a bucket, but the lighting of a fire.",
            "Bug 是通往真理的阶梯。",
            "The only way to do great work is to love what you do.",
            "The best way to predict the future is to invent it.",
            "下辈子再也不学Java了！"
        ];
        const quoteElement = document.getElementById('typewriter');
        let quoteIndex = 0;
        let charIndex = 0;
        let isDeleting = false;

        function typeQuote() {
            if (!quoteElement) return;
            const currentQuote = quotes[quoteIndex];
            if (isDeleting) {
                quoteElement.textContent = currentQuote.substring(0, charIndex - 1);
                charIndex--;
            } else {
                quoteElement.textContent = currentQuote.substring(0, charIndex + 1);
                charIndex++;
            }
            let speed = isDeleting ? 50 : 100;
            if (!isDeleting && charIndex === currentQuote.length) {
                isDeleting = true; speed = 2000;
            } else if (isDeleting && charIndex === 0) {
                isDeleting = false; quoteIndex = (quoteIndex + 1) % quotes.length; speed = 500;
            }
            setTimeout(typeQuote, speed);
        }

        // ==========================================
        // 4. 原有逻辑：背景星空 (Three.js Galaxy)
        // ==========================================
        let bgScene, bgCamera, bgRenderer, stars;
        const bgContainer = document.getElementById('canvas-galaxy');

        function initGalaxy() {
            if (!bgContainer) return;
            const width = window.innerWidth;
            const height = window.innerHeight;

            bgScene = new THREE.Scene();
            bgCamera = new THREE.PerspectiveCamera(75, width / height, 1, 3000);
            bgCamera.position.z = 1000;

            bgRenderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            bgRenderer.setSize(width, height);
            bgContainer.appendChild(bgRenderer.domElement);

            const starGeometry = new THREE.BufferGeometry();
            const starVertices = [];
            for (let i = 0; i < 5000; i++) {
                const x = THREE.MathUtils.randFloatSpread(2000);
                const y = THREE.MathUtils.randFloatSpread(2000);
                const z = THREE.MathUtils.randFloatSpread(2000);
                starVertices.push(x, y, z);
            }
            starGeometry.setAttribute('position', new THREE.Float32BufferAttribute(starVertices, 3));

            const starMaterial = new THREE.PointsMaterial({
                color: 0x99a3b2,
                size: 1.5,
                transparent: true,
                opacity: 0.8
            });
            stars = new THREE.Points(starGeometry, starMaterial);
            bgScene.add(stars);
        }

        // ==========================================
        // 5. 原有逻辑：3D 地球 (Three.js)
        // ==========================================
        const earthContainer = document.getElementById('earth-container');
        let earthScene, earthCamera, earthRenderer, earthMesh;
        const EARTH_SIZE = 150;

        function initEarth() {
            if (!earthContainer) return;

            const width = earthContainer.clientWidth;
            const height = earthContainer.clientHeight;

            earthScene = new THREE.Scene();
            earthCamera = new THREE.PerspectiveCamera(45, width / height, 0.1, 1000);
            earthCamera.position.z = 300;

            earthRenderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            earthRenderer.setSize(width, height);
            earthContainer.appendChild(earthRenderer.domElement);

            const geometry = new THREE.SphereGeometry(EARTH_SIZE, 32, 32);
            const material = new THREE.MeshStandardMaterial({
                color: 0x2e8b57,
                emissive: 0x0a102d,
                metalness: 0.8,
                roughness: 0.1,
                wireframe: true
            });

            earthMesh = new THREE.Mesh(geometry, material);
            earthScene.add(earthMesh);

            const ambientLight = new THREE.AmbientLight(0xffffff, 0.3);
            earthScene.add(ambientLight);

            const directionalLight = new THREE.DirectionalLight(0x58a6ff, 1.2);
            directionalLight.position.set(500, 500, 500);
            earthScene.add(directionalLight);
        }

        // 统一动画循环
        function animateAll() {
            requestAnimationFrame(animateAll);

            // 地球自转
            if (earthMesh) earthMesh.rotation.y += 0.0015;

            // 星空转动
            if (stars) {
                stars.rotation.y += 0.0001;
                stars.rotation.x += 0.00005;
            }

            // 渲染
            if (bgRenderer && bgScene && bgCamera) bgRenderer.render(bgScene, bgCamera);
            if (earthRenderer && earthScene && earthCamera) earthRenderer.render(earthScene, earthCamera);
        }

        // 窗口 Resize
        function onResize() {
            if (earthContainer && earthRenderer && earthCamera) {
                const width = earthContainer.clientWidth;
                const height = earthContainer.clientHeight;
                earthCamera.aspect = width / height;
                earthCamera.updateProjectionMatrix();
                earthRenderer.setSize(width, height);
            }
            if (bgRenderer && bgCamera) {
                const windowWidth = window.innerWidth;
                const windowHeight = window.innerHeight;
                bgCamera.aspect = windowWidth / windowHeight;
                bgCamera.updateProjectionMatrix();
                bgRenderer.setSize(windowWidth, windowHeight);
            }
        };


        // 运行统计元素引用
        const runTimeEl = document.getElementById('run-time');
        const visitCountEl = document.getElementById('visit-count');

        document.addEventListener('DOMContentLoaded', () => {
            initGalaxy();
            initEarth();
            animateAll();
            typeQuote();

            // 初始化运行统计
            initSiteStats();

            window.addEventListener('resize', onResize);
            onResize();
        });



        // ==========================================
        // 运行时间和访问次数统计
        // ==========================================
        // ==========================================
        // 网站统计 - 使用服务器端API
        // ==========================================
        
        async function initSiteStats() {
            try {
                // 使用服务器端API获取统计数据
                const stats = await initStats();
                
                // 更新访问次数显示
                updateVisitCount(stats.visitCount);
                
                // 启动运行时间计时器
                startRunTimeCounter(stats.startTime);
                
                console.log('✓ 网站统计初始化成功:', stats);
            } catch (error) {
                console.error('✗ 网站统计初始化失败:', error);
                // 显示默认值
                updateVisitCount(0);
                startRunTimeCounter(new Date().toISOString());
            }
        }
        
        function updateVisitCount(count) {
            if (visitCountEl) {
                visitCountEl.textContent = count.toLocaleString();
            }
        }
        
        function startRunTimeCounter(startTimeISO) {
            // 将ISO时间字符串转换为时间戳
            const startTime = new Date(startTimeISO).getTime();
            
            function updateRunTime() {
                const now = Date.now();
                const diff = now - startTime;
                
                const days = Math.floor(diff / (1000 * 60 * 60 * 24));
                const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                const seconds = Math.floor((diff % (1000 * 60)) / 1000);
                
                if (runTimeEl) {
                    runTimeEl.textContent = `${days}天${hours}时${minutes}分${seconds}秒`;
                }
            }
            
            // 立即更新一次
            updateRunTime();
            // 每秒更新
            setInterval(updateRunTime, 1000);
        }

        // ==========================================
        // 覆盖页面（关于我、工具导航）
        // ==========================================
        const pageMessages = {
            about: '啥也没写，等我飞升上界，再来寻求造化！',
            tools: '工具箱正在打造中，敬请期待...'
        };
        
        function showOverlayPage(pageType) {
            const page = document.getElementById(`${pageType}-page`);
            const textEl = document.getElementById(`${pageType}-text`);
            if (!page || !textEl) return;
            
            const message = pageMessages[pageType] || '';
            
            // 显示页面
            page.style.display = 'flex';
            setTimeout(() => page.classList.add('show'), 10);
            
            // 清空文字
            textEl.innerHTML = '';
            
            // 逐字淡入动画
            message.split('').forEach((char, index) => {
                const span = document.createElement('span');
                span.textContent = char === ' ' ? '\u00A0' : char;
                span.style.animationDelay = `${index * 0.1}s`;
                textEl.appendChild(span);
            });
        }
        
        function hideOverlayPage(pageType) {
            const page = document.getElementById(`${pageType}-page`);
            const textEl = document.getElementById(`${pageType}-text`);
            if (!page) return;
            page.classList.remove('show');
            setTimeout(() => {
                page.style.display = 'none';
                if (textEl) textEl.innerHTML = '';
            }, 500);
        }
        
        // 导航栏点击事件 - 在 DOMContentLoaded 后绑定
        document.addEventListener('DOMContentLoaded', () => {
            document.querySelectorAll('.nav-item[data-page]').forEach(item => {
                item.addEventListener('click', (e) => {
                    const page = item.dataset.page;
                    if (page === 'about' || page === 'tools') {
                        e.preventDefault();
                        showOverlayPage(page);
                    } else if (page === 'home') {
                        e.preventDefault();
                        hideOverlayPage('about');
                        hideOverlayPage('tools');
                    }
                });
            });
        });

        window.hideOverlayPage = hideOverlayPage;
    </script>
</body>

</html>
