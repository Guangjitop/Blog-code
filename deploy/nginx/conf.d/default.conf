# ===========================================
# 站点配置 - 账号管理系统
# ===========================================

upstream backend {
    server backend:8998;
    keepalive 32;
}

# HTTP 服务器
# 注意：如果使用Cloudflare，Cloudflare会处理SSL终止
# 源服务器只需要提供HTTP服务，不进行重定向
server {
    listen 80;
    server_name blog.mytype.top;
    
    # Let's Encrypt 验证路径（用于证书申请和续期）
    location /.well-known/acme-challenge/ {
        root /usr/share/nginx/html;
    }
    
    # 根目录 - 欢迎页
    root /usr/share/nginx/html;
    index index.html;

    # 欢迎页 - 根路径 (精确匹配,优先级最高)
    location = / {
        try_files /index.html =404;
    }

    # 欢迎页静态资源
    location ~* ^/(images|css|js)/ {
        root /usr/share/nginx/html;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # 前端应用静态资源 - /app/assets/ 路径（优先匹配）
    location /app/assets/ {
        alias /usr/share/nginx/html/app/assets/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
    
    # vite.svg 处理（前端应用使用，优先匹配）
    location = /app/vite.svg {
        alias /usr/share/nginx/html/app/vite.svg;
        access_log off;
    }

    # 前端应用 - /app/ 路径（SPA路由支持）
    # 使用 ^~ 修饰符确保优先匹配,不会被后面的正则表达式覆盖
    location ^~ /app/ {
        alias /usr/share/nginx/html/app/;
        try_files $uri $uri/ /app/index.html;
    }

    # 前端应用 - /app 路径（不带斜杠，重定向到 /app/）
    location = /app {
        return 301 /app/;
    }

    # 用户面板路由 - /user/ 路径（SPA路由支持）
    location ^~ /user/ {
        root /usr/share/nginx/html;
        try_files /app/index.html =404;
    }

    # 管理员面板路由 - /admin/ 路径（SPA路由支持）
    location ^~ /admin/ {
        root /usr/share/nginx/html;
        try_files /app/index.html =404;
    }

    # favicon 处理
    location = /favicon.ico {
        alias /usr/share/nginx/html/favicon.svg;
        access_log off;
    }

    location = /favicon.svg {
        root /usr/share/nginx/html;
        access_log off;
    }


    # 后端API代理 - /api/ 路径
    location /api/ {
        proxy_pass http://backend/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # 超时设置
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # 缓冲设置
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
    }

    # API文档
    location /docs {
        proxy_pass http://backend/docs;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /openapi.json {
        proxy_pass http://backend/openapi.json;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }


    # 错误页面
    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;
    
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}

