# ===========================================
# Docker Compose 主编排文件
# 账号管理系统
# ===========================================

version: '3.8'

services:
  # Nginx 反向代理 + 前端静态文件（映射8998端口）
  nginx:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.frontend
    container_name: account-nginx
    ports:
      - "80:80"    # Cloudflare / 外部访问
      - "8998:80"  # 本地直接访问
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      # SSL证书（如果使用HTTPS）
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # FastAPI 后端（映射8999端口）
  backend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.backend
    container_name: account-backend
    ports:
      - "8999:8998"  # 核心新增：宿主机8999 → 容器8998（匹配后端运行端口）
    environment:
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin121}
    volumes:
      - ../backend/accounts.db:/app/accounts.db
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8998/docs"]  # 保持和后端端口一致
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  app-network:
    driver: bridge

volumes:
  db-data:
    driver: local